<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>work-force.nl — My Documents</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1a3082;--navy-d:#112268;
  --text:#1a2340;--text-m:#4a5568;--text-l:#7a8ba8;
  --border:#dde3ec;--bg:#f1f5f9;
  --red:#c53030;--green:#276749;
}
html,body{height:100%;font-family:'Inter',-apple-system,sans-serif;font-size:14px;background:var(--bg);}
body{display:flex;flex-direction:column;min-height:100vh;}

/* ── Login ── */
#loginScreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;}
.login-card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.09);width:100%;max-width:400px;padding:36px 32px;}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.login-logo-icon{width:40px;height:40px;background:#1e293b;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.login-logo-text{font-size:17px;font-weight:700;color:#1e293b;letter-spacing:-.02em;}
.login-logo-sub{font-size:11px;color:#94a3b8;margin-top:1px;}
.login-title{font-size:20px;font-weight:700;color:#1e293b;margin-bottom:6px;}
.login-sub{font-size:13px;color:#64748b;margin-bottom:24px;line-height:1.55;}
.login-field label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;}
.login-field input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;color:#1e293b;outline:none;transition:border-color .15s;min-height:46px;}
.login-field input:focus{border-color:#1e293b;}
.login-btn{width:100%;margin-top:16px;padding:13px;background:#1e293b;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s;min-height:48px;}
.login-btn:hover{background:#0f172a;}
.login-btn:disabled{background:#94a3b8;cursor:not-allowed;}
.login-msg{font-size:13px;padding:10px 14px;border-radius:7px;margin-top:14px;display:none;}
.login-msg.error{background:#fff5f5;color:var(--red);border:1px solid #fed7d7;}
.login-footer{text-align:center;margin-top:20px;font-size:12px;color:#94a3b8;}
.login-footer a{color:#94a3b8;text-decoration:none;}
.login-footer a:hover{color:#475569;}

/* ── Worker portal ── */
#workerPortal{display:none;flex:1;flex-direction:column;}
.wp-header{background:#1e293b;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:20;}
.wp-header-left{min-width:0;}
.wp-header-title{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;letter-spacing:.01em;}
.wp-header-name{font-size:12px;color:#94a3b8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.wp-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.wp-signout-btn{background:rgba(255,255,255,.1);color:#e2e8f0;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;min-height:40px;white-space:nowrap;transition:background .15s;}
.wp-signout-btn:active{background:rgba(255,255,255,.18);}
.wp-lang-dd{position:relative;flex-shrink:0;}
.wp-lang-dd-btn{display:flex;align-items:center;gap:5px;padding:7px 10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#e2e8f0;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;min-height:40px;transition:background .15s;}
.wp-lang-dd-btn:hover{background:rgba(255,255,255,.18);}
.wp-lang-caret{font-size:10px;opacity:.6;margin-left:1px;}
.wp-lang-menu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.14);z-index:200;overflow:hidden;min-width:148px;}
.wp-lang-opt{display:flex;align-items:center;gap:9px;width:100%;padding:11px 14px;border:none;background:none;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;text-align:left;}
.wp-lang-opt:hover{background:#f1f5f9;color:#1e293b;}
.wp-lang-opt.active{font-weight:700;color:#1e293b;}
.wp-tabs{display:flex;gap:0;border-bottom:2px solid #e2e8f0;background:#fff;position:sticky;top:57px;z-index:19;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.wp-tab{flex:1;min-width:72px;padding:14px 6px 12px;font-size:13px;font-weight:500;color:#64748b;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;text-align:center;white-space:nowrap;min-height:50px;transition:color .15s,border-color .15s;}
.wp-tab.active{color:#1e293b;border-bottom-color:#1e293b;font-weight:700;}
.wp-tab:hover:not(.active){color:#334155;}
.wp-body{max-width:680px;margin:0 auto;padding:20px 16px 40px;width:100%;}
.wp-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin:24px 0 10px;}
.wp-filter-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:24px;}
.wp-filter-tab{padding:10px 4px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;min-height:52px;text-align:center;transition:all .15s;}
.wp-filter-tab:active{opacity:.85;}
.wp-filter-tab.active[data-f="missing"]{background:#fee2e2;color:#b91c1c;border-color:#fca5a5;}
.wp-filter-tab.active[data-f="expiring"]{background:#fef3c7;color:#92400e;border-color:#fcd34d;}
.wp-filter-tab.active[data-f="expired"]{background:#fee2e2;color:#991b1b;border-color:#fca5a5;}
.wp-filter-tab.active[data-f="ok"]{background:#dcfce7;color:#166534;border-color:#86efac;}
.wp-filter-tab.active[data-f="optional"]{background:#f1f5f9;color:#334155;border-color:#cbd5e1;}
.wp-filter-count{font-size:11px;font-weight:400;opacity:.8;display:block;margin-top:2px;}
.wp-empty-filter{text-align:center;padding:40px 16px;color:#94a3b8;font-size:14px;}
.wp-empty-icon{font-size:36px;margin-bottom:10px;}
.wp-doc-row{padding:16px;background:#fff;border-radius:12px;margin-bottom:10px;border:1px solid #e2e8f0;transition:box-shadow .15s;position:relative;}
.wp-doc-row:last-child{margin-bottom:0;}
.wp-doc-top{display:flex;align-items:flex-start;gap:12px;}
.wp-doc-icon{font-size:22px;flex-shrink:0;padding-top:2px;width:32px;text-align:center;}
.wp-doc-info{flex:1;min-width:0;}
.wp-doc-name-row{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.wp-doc-name{font-size:15px;font-weight:700;color:#1e293b;line-height:1.3;}
.wp-doc-meta-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:4px;}
.wp-doc-tip{font-size:12px;color:#64748b;font-style:italic;margin-top:6px;line-height:1.4;}
.wp-expiry-tag{font-size:12px;color:#64748b;white-space:nowrap;}
.wp-status-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;margin-top:4px;}
.wp-status-pill.ok{background:#dcfce7;color:#166534;}
.wp-status-pill.expiring{background:#fef3c7;color:#92400e;}
.wp-status-pill.missing{background:#fee2e2;color:#b91c1c;}
.wp-status-pill.expired{background:#fee2e2;color:#991b1b;}
.wp-status-pill.opt-neutral{background:#f1f5f9;color:#475569;}
.wp-req-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;background:#ffe4e6;color:#be123c;border:1px solid #fecdd3;margin-left:6px;vertical-align:middle;letter-spacing:.02em;}
.wp-opt-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;margin-left:6px;vertical-align:middle;}
.wp-pending-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;background:#fef3c7;color:#92400e;border:1px solid #fcd34d;margin-top:8px;}
.wp-rejected-notice{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:8px;padding:8px 12px;margin-top:8px;}
.wp-rejected-notice-label{font-size:11px;font-weight:700;color:#b91c1c;margin-bottom:3px;}
.wp-rejected-notice-text{font-size:12px;color:#7f1d1d;line-height:1.45;}
.wp-submit-form{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-top:14px;display:flex;flex-direction:column;gap:12px;}
.wp-submit-form label{font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:4px;}
.wp-submit-form input,.wp-submit-form .form-input{width:100%;max-width:100%;box-sizing:border-box;min-height:46px;font-size:15px;-webkit-appearance:none;appearance:none;}
.wp-submit-form input[type=file]{min-height:46px;padding:8px;}
.wp-submit-row{display:flex;gap:10px;}
.wp-submit-row .wp-doc-btn{flex:1;}
.wp-doc-btn{display:block;width:100%;margin-top:14px;padding:13px 16px;background:#059669;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;min-height:48px;transition:background .15s;font-family:inherit;}
.wp-doc-btn:active{background:#047857;}
.wp-doc-btn.cancel{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;}
.wp-doc-btn.cancel:active{background:#e2e8f0;}
.wp-doc-btn-secondary{background:#f1f5f9!important;color:#475569!important;border:1px solid #e2e8f0!important;font-size:13px!important;padding:9px 16px!important;min-height:40px!important;margin-top:8px!important;}
.wp-doc-btn-secondary:active{background:#e2e8f0!important;}
.form-input{padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:#1e293b;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:#1e293b;}
.wp-assign-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.wp-assign-card:hover{border-color:#94a3b8;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.wp-assign-card:active{background:#f8fafc;}
.wp-assign-title{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.wp-assign-meta{font-size:13px;color:#64748b;line-height:1.6;}
.wp-assign-chevron{font-size:16px;color:#94a3b8;flex-shrink:0;}
.wp-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin:20px 0 8px;}
.wp-section-label:first-child{margin-top:0;}
.wp-past-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;cursor:pointer;margin:16px 0 0;user-select:none;transition:background .12s;width:100%;font-family:inherit;}
.wp-past-toggle:hover{background:#f1f5f9;}
.wp-past-toggle-label{font-size:13px;font-weight:600;color:#475569;}
.wp-past-toggle-arrow{font-size:14px;color:#94a3b8;transition:transform .2s;}
.wp-past-toggle-arrow.open{transform:rotate(180deg);}
.wp-call-link{display:inline-flex;align-items:center;gap:6px;color:#16a34a;font-size:14px;font-weight:700;text-decoration:none;padding:8px 14px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;}
.wp-call-link:hover{background:#dcfce7;}
#wpProjDetail{position:fixed;inset:0;background:#f1f5f9;z-index:120;display:none;overflow-y:auto;}
.wp-proj-detail-header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#1e293b;color:#fff;position:sticky;top:0;z-index:5;}
.wp-proj-back-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:2px 6px;line-height:1;opacity:.8;}
.wp-proj-back-btn:hover{opacity:1;}
.wp-proj-detail-title{font-size:15px;font-weight:700;color:#fff;}
.wp-proj-detail-body{max-width:680px;margin:0 auto;padding:20px 16px 40px;}
.wp-proj-info-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:14px;}
.wp-proj-info-name{font-size:20px;font-weight:800;color:#1e293b;margin-bottom:4px;}
.wp-proj-info-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid #f1f5f9;}
.wp-proj-info-row:first-of-type{border-top:none;padding-top:14px;}
.wp-proj-info-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;width:110px;flex-shrink:0;padding-top:1px;}
.wp-proj-info-value{font-size:14px;font-weight:600;color:#1e293b;flex:1;}
.wp-proj-map-link{display:inline-flex;align-items:center;gap:5px;color:#2563eb;font-size:14px;font-weight:600;text-decoration:none;}
.wp-proj-map-link:hover{text-decoration:underline;}
.wp-proj-assign-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:14px;}
.wp-proj-assign-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:10px;}
.wp-profile-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px 16px;}
.wp-profile-title{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:16px;}
.wp-profile-field{margin-bottom:14px;}
.wp-profile-field label{font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:5px;}
.wp-profile-field input,.wp-profile-field textarea{width:100%;box-sizing:border-box;min-height:46px;font-size:15px;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;color:#1e293b;outline:none;}
.wp-profile-field input:focus,.wp-profile-field textarea:focus{border-color:#1e293b;}
.wp-profile-save{width:100%;padding:14px;background:#059669;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;min-height:50px;margin-top:6px;transition:background .15s;font-family:inherit;}
.wp-profile-save:active{background:#047857;}
.wp-readonly-field{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:14px;color:#475569;min-height:44px;display:flex;align-items:center;}
.wp-filter-label{display:block;font-size:13px;font-weight:600;}
.wp-doc-optional-intro{font-size:13px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-bottom:16px;line-height:1.5;}
.wp-doc-row:has(.wp-card-actions) .wp-doc-top{padding-right:72px;}
.wp-card-actions{position:absolute;top:12px;right:12px;display:flex;align-items:center;gap:6px;z-index:1;}
.wp-card-icon-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b;cursor:pointer;text-decoration:none;transition:background .15s,color .15s;padding:0;flex-shrink:0;font-family:inherit;}
.wp-card-icon-btn:hover,.wp-card-icon-btn:active{background:#e2e8f0;color:#1e293b;}
.wp-info-panel{font-size:13px;color:#334155;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:10px 12px;margin-top:10px;line-height:1.6;}
.wp-template-banner{display:flex;align-items:center;gap:10px;margin-top:10px;padding:10px 12px;background:#fffbeb;border:1.5px solid #f59e0b;border-radius:8px;}
.wp-template-banner-text{flex:1;min-width:0;}
.wp-template-banner-label{font-size:12px;font-weight:700;color:#78350f;}
.wp-esign-summary-banner{display:flex;align-items:flex-start;gap:8px;margin-bottom:14px;padding:10px 14px;background:#eff6ff;border:1.5px solid #93c5fd;border-radius:8px;font-size:13px;color:#1e40af;line-height:1.4;}
.wp-template-banner-sub{font-size:11px;color:#92400e;margin-top:1px;}
.wp-template-dl-btn{flex-shrink:0;padding:6px 12px;background:#f59e0b;border:none;border-radius:6px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;transition:background .15s;font-family:inherit;}
.wp-template-dl-btn:hover{background:#d97706;}
.wp-return-form{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:12px;}
</style>
</head>
<body>

<!-- Login screen -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon" style="font-size:0;"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><rect width="40" height="40" rx="10" fill="#1e293b"/><text x="20" y="26" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-0.5">WF</text></svg></div>
      <div>
        <div class="login-logo-text">work-force.nl</div>
        <div class="login-logo-sub">Labour Compliance &amp; Management</div>
      </div>
    </div>
    <div class="login-title">My Documents</div>
    <div class="login-sub">Enter your work email address to view your compliance documents and assignments.</div>
    <div class="login-field">
      <label for="wpEmailInput">Work email address</label>
      <input type="email" id="wpEmailInput" placeholder="you@company.com" autocomplete="email"
        onkeydown="if(event.key==='Enter')wpDirectLogin()"/>
    </div>
    <button class="login-btn" id="wpLoginBtn" onclick="wpDirectLogin()">View My Documents</button>
    <div class="login-msg" id="wpLoginMsg"></div>
    <div class="login-footer">
      <a href="index.html">← work-force.nl</a>
      &nbsp;·&nbsp;
      <a href="login.html">Management Sign In</a>
    </div>
  </div>
</div>

<!-- Worker portal -->
<div id="workerPortal" style="display:none;flex:1;flex-direction:column;">
  <div class="wp-header">
    <div class="wp-header-left">
      <div class="wp-header-title" id="wpHeaderTitle">Worker Portal</div>
      <div class="wp-header-name" id="wpHeaderName"></div>
    </div>
    <div class="wp-header-right">
      <span id="wpStatusBadge"></span>
      <div class="wp-lang-dd" id="wpLangDd">
        <button class="wp-lang-dd-btn" id="wpLangDdBtn" onclick="wpToggleLangMenu(event)">
          <span id="wpLangFlag">🇬🇧</span>
          <span id="wpLangCode">EN</span>
          <span class="wp-lang-caret">▾</span>
        </button>
        <div class="wp-lang-menu" id="wpLangMenu" style="display:none;">
          <button class="wp-lang-opt" id="wpLangOptEN" onclick="wpSetLang('en')">🇬🇧 English</button>
          <button class="wp-lang-opt" id="wpLangOptNL" onclick="wpSetLang('nl')">🇳🇱 Nederlands</button>
          <button class="wp-lang-opt" id="wpLangOptRO" onclick="wpSetLang('ro')">🇷🇴 Română</button>
        </div>
      </div>
      <button class="wp-signout-btn" id="wpSignOutBtn" onclick="wpSignOut()">Sign out</button>
    </div>
  </div>
  <div class="wp-tabs">
    <button class="wp-tab active" id="wpTabDocs" onclick="wpSwitch('docs')">Documents</button>
    <button class="wp-tab" id="wpTabAssign" onclick="wpSwitch('assign')">Projects</button>
    <button class="wp-tab" id="wpTabProfile" onclick="wpSwitch('profile')">Profile</button>
    <button class="wp-tab" id="wpTabResources" onclick="wpSwitch('resources')">Resources</button>
    <button class="wp-tab" id="wpTabTraining" onclick="wpSwitch('training')">Training</button>
  </div>
  <div class="wp-body">
    <div id="wpViewDocs"></div>
    <div id="wpViewAssign" style="display:none;"></div>
    <div id="wpViewProfile" style="display:none;"></div>
    <div id="wpViewResources" style="display:none;"></div>
    <div id="wpViewTraining" style="display:none;"></div>
  </div>
  <!-- Project detail full-screen overlay -->
  <div id="wpProjDetail">
    <div class="wp-proj-detail-header">
      <button class="wp-proj-back-btn" onclick="wpCloseProjDetail()">&#8592;</button>
      <span class="wp-proj-detail-title" id="wpProjDetailTitle">Project Details</span>
    </div>
    <div class="wp-proj-detail-body" id="wpProjDetailBody"></div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────

// Resolve org from ?org=<slug> URL param (falls back to SITE_ORG_ID for TMC)
let resolvedOrgId = SITE_ORG_ID;
let orgSlugProvided = false;   // was an ?org= slug present in the URL?
let orgSlugResolved = false;   // did that slug match a real organisation?
async function resolveOrg(){
  const slug = new URLSearchParams(location.search).get('org');
  if(!slug || !sbClient) return;
  orgSlugProvided = true;
  try{
    const {data} = await sbClient.from('organisations').select('id').eq('slug',slug).maybeSingle();
    if(data?.id){ resolvedOrgId = data.id; orgSlugResolved = true; }
  }catch(e){ console.warn('[WP] org resolve failed:',e.message); }
}

// ── Helper functions ───────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function weekMonday(date){ const d=new Date(date);const day=d.getDay()||7;d.setDate(d.getDate()-day+1);d.setHours(0,0,0,0);return d; }
function weekSunday(mon){ const d=new Date(mon);d.setDate(d.getDate()+6);return d; }
function addWeeks(date,n){ const d=new Date(date);d.setDate(d.getDate()+n*7);return d; }

function workerTypeLabel(typeId){
  const wt=(settings.workerTypes||[]).find(t=>t.id===typeId);
  return wt?wt.label:(typeId||'Unknown');
}

function docStatusAt(doc, refDate){
  if(!doc||doc.status==='missing') return 'missing';
  if(!doc.date) return 'ok';
  const expiry=new Date(doc.date); expiry.setHours(0,0,0,0);
  const ref=new Date(refDate); ref.setHours(0,0,0,0);
  if(expiry<ref) return 'expired';
  const daysLeft=(expiry-ref)/86400000;
  if(daysLeft<=settings.warningDays) return 'expiring';
  return 'ok';
}

function goStatusAt(w, refDate){
  const tmpl=tmplForWorker(w);
  const req=tmpl.filter(d=>d.req);
  const anyMissing=req.some(d=>{ const s=docStatusAt(w.docs[d.id],refDate); return s==='missing'||s==='expired'; });
  if(anyMissing) return 'nogo';
  const anyExpiring=req.some(d=>docStatusAt(w.docs[d.id],refDate)==='expiring');
  if(anyExpiring) return 'warning';
  return 'go';
}

function tmplForWorker(w){
  const items=(w.docSetId&&docSetItems[w.docSetId])
    ?docSetItems[w.docSetId]
    :(w.type==='zzp'?(docSetItems[SET_NL_ZZP]||DEFAULT_ZZP_DOCS):(docSetItems[SET_NL_BLUE]||DEFAULT_BLUE_DOCS));
  const overrides=docReqOverrides[w.id]||{};
  return items.map(d=>{
    const baseReq=!d.archived&&!!d.req;
    const ov=overrides[d.id];
    const effectiveReq=d.archived?false:(ov!==undefined?!!ov:baseReq);
    return{...d,req:effectiveReq,_baseReq:baseReq,_overridden:ov!==undefined};
  });
}

// ── Translation helper ─────────────────────────────────────────────────────
async function wpTranslate(text, targetLang){
  if(!text||targetLang==='en') return text;
  const key=`${text}|${targetLang}`;
  if(wpInfoCache.has(key)) return wpInfoCache.get(key);
  try{
    const resp=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.slice(0,450))}&langpair=auto|${targetLang}`);
    if(!resp.ok) throw new Error('http '+resp.status);
    const data=await resp.json();
    if(data.responseStatus===200){ const tr=data.responseData.translatedText; wpInfoCache.set(key,tr); return tr; }
  }catch(e){ console.warn('[WP] translate failed:',e.message); }
  return text;
}

// ── Login flow ─────────────────────────────────────────────────────────────
function loginMsg(text, isError){
  const el=document.getElementById('wpLoginMsg');
  el.textContent=text; el.className='login-msg '+(isError?'error':''); el.style.display=text?'block':'none';
}

async function wpDirectLogin(){
  if(!sbClient){ loginMsg('Loading, please try again.',true); return; }
  const email=(document.getElementById('wpEmailInput')?.value||'').trim().toLowerCase();
  if(!email){ loginMsg('Please enter your email address.',true); return; }
  loginMsg('');
  const btn=document.getElementById('wpLoginBtn');
  btn.disabled=true; btn.textContent='Signing in…';
  try{
    await resolveOrg();
    const {data,error}=await sbClient.rpc('get_worker_portal',{p_email:email,p_org_id:resolvedOrgId});
    if(error) throw error;
    if(!data){
      // No match in the resolved org. If the URL carried an unknown slug, or no
      // slug at all (defaulted to TMC), the worker may be on the wrong portal —
      // point them at their company-specific link rather than a flat dead-end.
      if(orgSlugProvided && !orgSlugResolved){
        loginMsg('That company link wasn’t recognised. Please check the worker-portal link your employer gave you.',true);
      }else if(!orgSlugProvided){
        loginMsg('No worker profile found for this email. If your employer gave you a company-specific portal link, please use that link to sign in. Otherwise, ask them to add your email to your worker profile.',true);
      }else{
        loginMsg('No worker profile found for this email address. Ask your employer to add your email to your worker profile.',true);
      }
      return;
    }
    wpWorkerEmail=email;
    try{ localStorage.setItem(WP_SESSION_KEY, JSON.stringify({email, orgId:resolvedOrgId, expires:Date.now()+WP_SESSION_TTL})); }catch(_){}
    wpLoadPortalData(data);
    await initWorkerPortal(data.worker.id);
  }catch(e){
    loginMsg('Could not sign in: '+(e.message||e),true);
  }finally{
    btn.disabled=false; btn.textContent='View My Documents';
  }
}

function wpSignOut(){
  try{ localStorage.removeItem(WP_SESSION_KEY); }catch(_){}
  wpWorkerId=null; wpWorkerObj=null; wpWorkerEmail=null;
  wpSubmissions=[]; wpIssuedDocs=[];
  document.getElementById('workerPortal').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('wpEmailInput').value='';
  document.getElementById('wpEmailInput').focus();
}

async function wpTryAutoLogin(){
  try{
    const raw=localStorage.getItem(WP_SESSION_KEY);
    if(!raw) return;
    const sess=JSON.parse(raw);
    if(!sess?.email||!sess?.orgId||!sess?.expires) return;
    if(Date.now()>sess.expires){ localStorage.removeItem(WP_SESSION_KEY); return; }
    resolvedOrgId=sess.orgId;
    const {data,error}=await sbClient.rpc('get_worker_portal',{p_email:sess.email,p_org_id:sess.orgId});
    if(error||!data?.worker){ localStorage.removeItem(WP_SESSION_KEY); return; }
    // Refresh TTL on each successful auto-login
    try{ localStorage.setItem(WP_SESSION_KEY, JSON.stringify({email:sess.email,orgId:sess.orgId,expires:Date.now()+WP_SESSION_TTL})); }catch(_){}
    wpWorkerEmail=sess.email;
    wpLoadPortalData(data);
    await initWorkerPortal(data.worker.id);
  }catch(e){ console.warn('[WP] auto-login failed:',e.message); localStorage.removeItem(WP_SESSION_KEY); }
}

// ── Data loading ───────────────────────────────────────────────────────────
function wpLoadPortalData(data){
  const w=data.worker;
  const workerObj={id:w.id,name:w.full_name,type:w.worker_type,ref:w.reference||'',nat:w.nationality||'',agency:w.agency_name||'',email:w.email||'',phone:w.phone||'',docSetId:w.document_set_id||undefined,notes:w.notes||'',active:true,docs:{}};
  workers=[workerObj];
  docSets=(data.doc_sets||[]).map(s=>({id:s.id,name:s.name,description:s.description,country:s.country,builtIn:s.built_in}));
  docSetItems={};
  docSets.forEach(s=>docSetItems[s.id]=[]);
  (data.doc_set_items||[]).forEach(d=>{
    if(!docSetItems[d.document_set_id]) docSetItems[d.document_set_id]=[];
    docSetItems[d.document_set_id].push({id:d.doc_key,name:d.name,cat:d.category,icon:d.icon,tip:d.tip,infoText:d.info_text||null,infoUrl:d.info_url||null,templateFileName:d.template_file_name||null,templateFilePath:d.template_file_path||null,allowIssue:!!d.allow_issue,req:!!d.required&&!d.archived,builtIn:d.built_in,custom:!d.built_in,archived:!!d.archived});
  });
  tmplForWorker(workerObj).forEach(d=>workerObj.docs[d.id]={status:'missing',date:null,issueDate:null,files:[]});
  (data.worker_docs||[]).forEach(d=>{ workerObj.docs[d.doc_key]={status:d.status||'missing',date:d.expiry_date,issueDate:d.issue_date,files:[]}; });
  fileStore[w.id]={};
  tmplForWorker(workerObj).forEach(d=>fileStore[w.id][d.id]=[]);
  (data.worker_doc_files||[]).forEach(f=>{
    const doc=(data.worker_docs||[]).find(x=>x.id===f.worker_document_id);
    const did=doc?.doc_key;
    if(did){ if(!fileStore[w.id][did]) fileStore[w.id][did]=[]; fileStore[w.id][did].push({name:f.file_name,size:f.size_bytes,type:f.mime_type,file_path:f.file_path,storagePath:f.file_path,superseded:!!f.superseded}); }
  });
  projectStore=(data.projects||[]).map(p=>({id:p.id,name:p.name,client:p.client||'',pm:p.project_manager||'',phone:p.contact_phone||'',desc:p.description||'',location:p.location||'',active:p.active!==false}));
  projectAssignments=(data.assignments||[]).map(a=>({id:a.id,wid:a.worker_id,projectId:a.project_id,startDate:a.start_date||'',endDate:a.end_date||'',rate:a.rate??'',rateType:a.rate_type||'day',notes:a.notes||'',contractFiles:[]}));
  wpSubmissions=data.submissions||[];
  wpAccomAssignments=(data.accom_assignments||[]).map(a=>({id:a.id,propId:a.property_id,startDate:a.start_date||'',endDate:a.end_date||'',notes:a.notes||'',chargeToOperative:a.charge_to_operative||false}));
  wpVehAssignments=(data.veh_assignments||[]).map(a=>({id:a.id,vehicleId:a.vehicle_id,startDate:a.start_date||'',endDate:a.end_date||'',notes:a.notes||'',chargeToOperative:a.charge_to_operative||false}));
  wpToolAssignments=(data.tool_assignments||[]).map(a=>({id:a.id,toolId:a.tool_id,startDate:a.start_date||'',endDate:a.end_date||'',notes:a.notes||'',chargeToOperative:a.charge_to_operative||false}));
  wpProperties=(data.properties||[]).map(p=>({id:p.id,name:p.name,address:p.address||''}));
  wpVehicles=(data.vehicles||[]).map(v=>({id:v.id,desc:v.description||'',reg:v.registration_plate||''}));
  wpTools=(data.tools||[]).map(tl=>({id:tl.id,name:tl.name,desc:tl.description||'',serial:tl.serial_number||''}));
  wpReturnRequests=(data.return_requests||[]);
  wpIssuedDocs=(data.issued_docs||[]).map(d=>({id:d.id,docKey:d.doc_key,filePath:d.file_path,fileName:d.file_name,issuedBy:d.issued_by||'',issuedAt:d.issued_at,status:d.status||'pending_signature',signatureRequestId:d.signature_request_id||null}));
}

async function wpLoadSubmissions(){
  if(!sbClient||!wpWorkerId||!wpWorkerEmail) return;
  try{
    const {data,error}=await sbClient.rpc('get_worker_portal',{p_email:wpWorkerEmail,p_org_id:resolvedOrgId});
    if(error) throw error;
    wpSubmissions=(data?.submissions)||[];
    wpReturnRequests=(data?.return_requests)||[];
    wpIssuedDocs=(data?.issued_docs||[]).map(d=>({id:d.id,docKey:d.doc_key,filePath:d.file_path,fileName:d.file_name,issuedBy:d.issued_by||'',issuedAt:d.issued_at,status:d.status||'pending_signature'}));
    wpCompetencies=(data?.competency_assignments||[]);
    wpCompRecords=(data?.comp_records||[]);
  }catch(e){ console.warn('[WP] wpLoadSubmissions:',e.message); }
}

// ── Portal init ────────────────────────────────────────────────────────────
async function initWorkerPortal(workerId){
  wpWorkerId=workerId;
  wpWorkerObj=workers.find(w=>w.id===workerId)||null;
  try{ const sl=localStorage.getItem('wpLang'); if(sl&&wpI18n[sl]) wpLang=sl; }catch(e){}
  await wpLoadSubmissions();
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('workerPortal').style.display='flex';
  document.body.style.background='var(--bg)';
  wpDocFilter='missing';
  wpUpdateLangUI();
  const w=wpWorkerObj;
  document.getElementById('wpHeaderName').textContent=w?w.name:'Worker';
  if(w){
    const st=goStatusAt(w,new Date());
    const stLabel={go:'✓ GO',warning:'⚠ Warning',nogo:'✕ No-Go'}[st]||'—';
    const stColor={go:'#276749',warning:'#b45309',nogo:'#c53030'}[st]||'#64748b';
    document.getElementById('wpStatusBadge').innerHTML=`<span style="padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;color:#fff;background:${stColor};">${stLabel}</span>`;
  }

}

// ── Portal navigation ──────────────────────────────────────────────────────
function wpSwitch(tab){
  wpActiveTab=tab;
  const tabMap={docs:'Docs',assign:'Assign',profile:'Profile',resources:'Resources',training:'Training'};
  ['docs','assign','profile','resources','training'].forEach(tp=>{
    const viewId='wpView'+tp.charAt(0).toUpperCase()+tp.slice(1);
    const tabId='wpTab'+tabMap[tp];
    const el=document.getElementById(viewId);
    if(el) el.style.display=tab===tp?'block':'none';
    document.getElementById(tabId)?.classList?.toggle('active',tab===tp);
  });
  if(tab==='docs') renderWPDocs();
  if(tab==='assign') renderWPAssignments();
  if(tab==='profile') renderWPProfile();
  if(tab==='resources') renderWPResources();
  if(tab==='training') renderWPTraining();
}

function wpToggleLangMenu(ev){
  ev?.stopPropagation();
  const menu=document.getElementById('wpLangMenu');
  if(!menu) return;
  const open=menu.style.display==='none';
  menu.style.display=open?'block':'none';
  if(open){ const close=()=>{menu.style.display='none';document.removeEventListener('click',close);}; setTimeout(()=>document.addEventListener('click',close),0); }
}

function wpSetLang(lang){
  wpLang=lang;
  wpInfoCache.clear();
  try{localStorage.setItem('wpLang',lang);}catch(e){}
  document.getElementById('wpLangMenu').style.display='none';
  wpUpdateLangUI();
  const at=wpActiveTab||'docs';
  if(at==='docs') renderWPDocs();
  else if(at==='assign') renderWPAssignments();

  else if(at==='resources') renderWPResources();
}

  const w=wpWorkerObj; if(!w){el.innerHTML=`<p>${t('workerNotFound')}</p>`;return;}
  const today=new Date();
  const tmpl=tmplForWorker(w);
  const pendingMap=Object.fromEntries(wpSubmissions.filter(s=>s.worker_id===wpWorkerId&&s.status==='pending').map(s=>[s.doc_key,s]));
  const rejectedMap={};
  wpSubmissions.filter(s=>s.worker_id===wpWorkerId&&s.status==='rejected'&&s.review_notes).sort((a,b)=>new Date(b.reviewed_at||b.submitted_at)-new Date(a.reviewed_at||a.submitted_at)).forEach(s=>{if(!rejectedMap[s.doc_key])rejectedMap[s.doc_key]=s;});

  const filterCounts={missing:0,expiring:0,expired:0,ok:0,optional:0};
  tmpl.forEach(d=>{
    const st=docStatusAt(w.docs?.[d.id],today);
    if(st==='missing'&&d.req) filterCounts.missing++;
    else if(st==='missing'&&!d.req) filterCounts.optional++;

    else if(st==='expired') filterCounts.expired++;

  const eSigCount=wpIssuedDocs.filter(x=>x.signatureRequestId).length;

<div class="wp-filter-tabs">
    <button class="wp-filter-tab${wpDocFilter==='missing'?' active':''}" data-f="missing" onclick="wpSetDocFilter('missing')"><span class="wp-filter-label">${t('missing')}</span><span class="wp-filter-count">${filterCounts.missing}</span></button>

          ${infoPanel}
          ${d.templateFilePath?(()=>{const _p=d.templateFilePath.replace(/'/g,"\\'"),_n=(d.templateFileName||'template').replace(/'/g,"\\'");return`<div class="wp-template-banner"><div class="wp-template-banner-text"><div class="wp-template-banner-label">${t('officialFormRequired')}</div><div class="wp-template-banner-sub">${t('templateSub')}</div></div><button class="wp-template-dl-btn" onclick="wpDownloadFile('${_p}','${_n}')">${t('download')}</button></div>`;})():''}
        </div>

      ${(()=>{const _iDoc=wpIssuedDocs.find(x=>x.docKey===d.id);if(!_iDoc)return'';const _ip=_iDoc.filePath.replace(/'/g,"\\'"),_in=_iDoc.fileName.replace(/'/g,"\\'");if(_iDoc.signatureRequestId){return`<div class="wp-template-banner" style="background:#eff6ff;border-color:#93c5fd;"><div class="wp-template-banner-text"><div class="wp-template-banner-label" style="color:#1d4ed8;">✉️ Sent for e-signature</div><div class="wp-template-banner-sub" style="color:#1e40af;">Check your email for the signing link. Once signed, your copy is filed automatically.</div></div><button class="wp-template-dl-btn" style="background:#2563eb;" onclick="wpDownloadFile('${_ip}','${_in}')">Download</button></div>`;}return`<div class="wp-template-banner" style="background:#ede9fe;border-color:#c4b5fd;"><div class="wp-template-banner-text"><div class="wp-template-banner-label" style="color:#6d28d9;">📤 Personalised document to sign</div><div class="wp-template-banner-sub" style="color:#5b21b6;">Download, sign, and upload your signed copy below</div></div><button class="wp-template-dl-btn" style="background:#7c3aed;" onclick="wpDownloadFile('${_ip}','${_in}')">Download</button></div>`;})()}
      ${(!eSigPending&&isOpen)?`<div class="wp-submit-form">

  let filtered;
  if(wpDocFilter==='missing') filtered=tmpl.filter(d=>docStatusAt(w.docs?.[d.id],today)==='missing'&&d.req);
  else if(wpDocFilter==='optional') filtered=tmpl.filter(d=>docStatusAt(w.docs?.[d.id],today)==='missing'&&!d.req);
  else filtered=tmpl.filter(d=>docStatusAt(w.docs?.[d.id],today)===wpDocFilter);

  if(!filtered.length){
    const emptyMsg={missing:t('emptyMissing'),expiring:t('emptyExpiring'),expired:t('emptyExpired'),ok:t('emptyOk'),optional:t('emptyOptional')}[wpDocFilter]||t('emptyDocs');
    const emptyIcon={missing:'✓',expiring:'🟡',expired:'✓',ok:'✓',optional:'✓'}[wpDocFilter]||'—';
    html+=`<div class="wp-empty-filter"><div class="wp-empty-icon">${emptyIcon}</div><div>${emptyMsg}</div></div>`;
  } else if(wpDocFilter==='optional'){
    html+=`<div class="wp-doc-optional-intro">${t('optionalIntro')}</div>`;
    const cats=[...new Set(filtered.map(d=>d.cat||'General'))];
    cats.forEach(cat=>{
      html+=`<div class="wp-section-title">${esc(cat)}</div>`;
      filtered.filter(d=>(d.cat||'General')===cat).forEach(d=>{ html+=renderDocCard(d); });
    });
  } else {
    const cats=[...new Set(filtered.map(d=>d.cat||'General'))];
    cats.forEach(cat=>{
      html+=`<div class="wp-section-title">${esc(cat)}</div>`;
      filtered.filter(d=>(d.cat||'General')===cat).forEach(d=>{ html+=renderDocCard(d); });
    });
  }
  el.innerHTML=html;
}

function wpToggleSubmit(docKey){ wpDocSubmitOpen[docKey]=!wpDocSubmitOpen[docKey]; renderWPDocs(); }

async function submitWPDoc(docKey){
  if(!sbClient||!wpWorkerId||!wpWorkerEmail){alert(t('notSignedIn'));return;}
  const expiryDate=(document.getElementById(`wpExp_${docKey}`)?.value||'').trim()||null;
  const issueDate=(document.getElementById(`wpIss_${docKey}`)?.value||'').trim()||null;
  const notes=(document.getElementById(`wpNote_${docKey}`)?.value||'').trim()||null;
  const fileInput=document.getElementById(`wpFile_${docKey}`);
  const file=fileInput?.files?.[0]||null;
  if(!expiryDate&&!file){alert(t('pleaseAddExpiry'));return;}

  let filePath=null,fileName=null,fileSize=null,mimeType=null;
  if(file){
    const ext=file.name.split('.').pop();
    filePath=`${resolvedOrgId}/worker-submissions/${wpWorkerId}/${docKey}/${Date.now()}.${ext}`;
    try{
      const {error}=await sbClient.storage.from(SB_BUCKET).upload(filePath,file,{contentType:file.type||'application/octet-stream',upsert:false});
      if(error) throw error;
      fileName=file.name; fileSize=file.size; mimeType=file.type;
    }catch(e){alert(t('fileUploadFailed')+e.message+'\n\n'+t('canStillSubmit'));filePath=null;}
  }

  try{
    const {error}=await sbClient.rpc('submit_worker_document',{
      p_email:wpWorkerEmail,p_worker_id:wpWorkerId,p_doc_key:docKey,
      p_expiry_date:expiryDate||null,p_issue_date:issueDate||null,p_notes:notes||null,
      p_file_path:filePath||null,p_file_name:fileName||null,p_file_size:fileSize||null,p_mime_type:mimeType||null
    });
    if(error) throw error;
  }catch(e){
    if(filePath) sbClient.storage.from(SB_BUCKET).remove([filePath]).catch(()=>{});
    alert(t('couldNotSubmit')+e.message); return;
  }
  wpDocSubmitOpen[docKey]=false;
  if(!wpSubmissions.some(s=>s.worker_id===wpWorkerId&&s.doc_key===docKey&&s.status==='pending')){
    wpSubmissions.push({id:'_opt_'+Date.now(),worker_id:wpWorkerId,doc_key:docKey,status:'pending',submitted_at:new Date().toISOString()});
  }
  renderWPDocs();
  await wpLoadSubmissions();
  renderWPDocs();
}

  function resStatusBadge(endDate){
    if(!endDate) return `<span style="padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;background:#dcfce7;color:#276749;border:1px solid #86efac;">${t('active')}</span>`;

        </div>
        ${isActive?hasPending
          ?`<div style="margin-top:8px;padding:4px 10px;border-radius:8px;background:#fef3c7;color:#b45309;font-size:12px;font-weight:600;display:inline-block;">${t('returnPending')}</div>`

    a=>{const tl=wpTools.find(x=>x.id===a.toolId);return tl?.name||t('toolFallback');},
    a=>{const tl=wpTools.find(x=>x.id===a.toolId);return tl?.serial?'S/N: '+tl.serial:'';},
    'tool',t('noTools'));

  el.innerHTML=html||`<p style="color:var(--text-l);">${t('noResources')}</p>`;

async function wpSubmitReturn(resourceType, assignmentId){
  if(!sbClient||!wpWorkerId||!wpWorkerEmail){alert(t('notSignedIn'));return;}
  const fileInput=document.getElementById(`wpReturnFile_${assignmentId}`);
  const file=fileInput?.files?.[0]||null;
  const notes=(document.getElementById(`wpReturnNote_${assignmentId}`)?.value||'').trim()||null;
  const proposedDate=(document.getElementById(`wpReturnDate_${assignmentId}`)?.value||'').trim()||new Date().toISOString().slice(0,10);

  let filePath=null,fileName=null,fileSize=null,mimeType=null;
  if(file){
    const ext=file.name.split('.').pop();
    filePath=`${resolvedOrgId}/worker-submissions/${wpWorkerId}/returns/${resourceType}_${assignmentId}_${Date.now()}.${ext}`;
    try{
      const {error}=await sbClient.storage.from(SB_BUCKET).upload(filePath,file,{contentType:file.type||'application/octet-stream',upsert:false});
      if(error) throw error;
      fileName=file.name; fileSize=file.size; mimeType=file.type;
    }catch(e){ console.warn('[WP] return file upload failed:',e.message); alert(t('returnFileUploadFailed')+e.message+'\n\n'+t('canStillSubmitReturn')); filePath=null; }
  }

  try{
    const {error}=await sbClient.rpc('submit_resource_return',{
      p_email:wpWorkerEmail,p_worker_id:wpWorkerId,p_resource_type:resourceType,
      p_assignment_id:assignmentId,p_file_path:filePath||null,p_file_name:fileName||null,
      p_file_size:fileSize||null,p_mime_type:mimeType||null,p_notes:notes||null,
      p_proposed_date:proposedDate||null
    });

    alert(t('returnSubmitted'));

      const {data,error:e2}=await sbClient.rpc('get_worker_portal',{p_email:wpWorkerEmail,p_org_id:resolvedOrgId});

    }catch(e){ console.warn('[WP] wpSubmitReturn reload:',e.message); }
    renderWPResources();
  }catch(e){ alert(t('couldNotSubmit')+e.message); }

function renderWPTraining(){
  const el = document.getElementById('wpViewTraining');
  if(!el) return;
  if(!wpCompetencies.length){
    el.innerHTML = `<div style="text-align:center;padding:48px 20px;">
      <div style="font-size:40px;margin-bottom:14px;">🎓</div>
      <div style="font-size:16px;font-weight:700;color:#1e293b;margin-bottom:6px;">No training requirements</div>
      <div style="font-size:13px;color:#64748b;">Your organisation hasn't assigned any competency requirements yet.</div>
    </div>`;
    return;
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const warnDays = 60;

  function latestRecord(compId){
    return (wpCompRecords||[])
      .filter(r=>r.competency_id===compId)
      .sort((a,b)=>new Date(b.submitted_at||0)-new Date(a.submitted_at||0))[0]||null;
  }

  function compStatus(comp, rec){
    if(!rec) return {label:'Missing',color:'#dc2626',bg:'#fee2e2'};
    if(rec.status==='pending') return {label:'Pending Review',color:'#92400e',bg:'#fef3c7'};
    if(rec.status==='rejected') return {label:'Rejected',color:'#dc2626',bg:'#fee2e2'};
    if(rec.status==='approved'){
      if(comp.expiry_tracking && rec.expiry_date){
        const exp = new Date(rec.expiry_date); exp.setHours(0,0,0,0);
        if(exp < today) return {label:'Expired',color:'#dc2626',bg:'#fee2e2'};
        const daysLeft = Math.ceil((exp-today)/(1000*60*60*24));
        if(daysLeft <= warnDays) return {label:'Expiring in '+daysLeft+'d',color:'#92400e',bg:'#fef3c7'};
      }
      return {label:'Approved',color:'#065f46',bg:'#d1fae5'};
    }
    return {label:'Missing',color:'#dc2626',bg:'#fee2e2'};
  }

  // Group by category
  const cats = {};
  (wpCompetencies||[]).forEach(c=>{
    const cat = c.category||'General';
    if(!cats[cat]) cats[cat]=[];
    cats[cat].push(c);
  });

  let html = '<div style="padding:16px;">';
  Object.entries(cats).forEach(([cat,items])=>{
    html += `<div style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7c3aed;margin-bottom:10px;">${esc(cat)}</div>`;
    items.forEach(comp=>{
      const rec = latestRecord(comp.competency_id);
      const st = compStatus(comp, rec);
      const hasTmpl = comp.template_file_path;
      const infoId = 'wpCompInfo_'+comp.competency_id;
      html += `<div class="wp-doc-card" style="margin-bottom:12px;">
        <div class="wp-doc-top">
          <div class="wp-doc-meta">
            <span class="wp-doc-name">${esc(comp.name)}</span>
            ${comp.required===false?'<span style="font-size:11px;color:#94a3b8;margin-left:4px;">(Optional)</span>':''}
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            ${comp.info_text?`<button class="wp-card-icon-btn" onclick="document.getElementById('${infoId}').style.display=document.getElementById('${infoId}').style.display==='none'?'block':'none'" title="Info">ℹ</button>`:''}
            ${comp.info_url?`<a class="wp-card-icon-btn" href="${esc(comp.info_url)}" target="_blank" title="Training link">🔗</a>`:''}
          </div>
        </div>
        ${comp.info_text?`<div id="${infoId}" class="wp-info-panel" style="display:none;">${esc(comp.info_text)}</div>`:''}
        <div class="wp-doc-status-row">
          <span class="wp-doc-status" style="background:${st.bg};color:${st.color};">${esc(st.label)}</span>
          ${rec&&rec.expiry_date?`<span style="font-size:12px;color:#64748b;">Expires: ${rec.expiry_date}</span>`:''}
        </div>
        ${rec&&rec.file_name?`<div style="font-size:12px;color:#64748b;padding:0 14px 6px;">📄 ${esc(rec.file_name)}</div>`:''}
        ${hasTmpl?`<div class="wp-banner wp-banner-tmpl"><span>📋 Template available</span><button class="wp-doc-btn" style="margin-left:auto;" onclick="wpDownloadFile('${esc(hasTmpl)}','${esc(comp.template_file_name||'template')}')">Download</button></div>`:''}
        <div style="padding:10px 14px;border-top:1px solid #f1f5f9;">
          ${rec&&rec.status==='pending'
            ?`<div style="font-size:12px;color:#92400e;background:#fef3c7;border-radius:8px;padding:8px 12px;">⏳ Your submission is being reviewed. You'll see the status updated here.</div>`
            :`<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#334155;cursor:pointer;min-height:44px;">
              <span>📤 Upload evidence</span>
              <input type="file" accept="image/*,.pdf,.doc,.docx" style="flex:1;font-size:12px;" onchange="wpSubmitCompetency('${comp.competency_id}',this)"/>
            </label>`
          }
        </div>
      </div>`;
    });
    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

async function wpSubmitCompetency(competencyId, input){
  const file = input?.files?.[0];
  if(!file) return;
  if(!sbClient||!wpWorkerEmail){ alert(t('notSignedIn')||'Not signed in.'); input.value=''; return; }
  const origLabel = input.previousElementSibling?.textContent||'Upload';
  const btn = input.parentElement;
  if(btn) btn.style.opacity='0.6';
  try{
    const ext = file.name.split('.').pop();
    const uuid = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);
    const path = `worker-submissions/${resolvedOrgId}/competency/${uuid}.${ext}`;
    const {error:upErr} = await sbClient.storage.from(SB_BUCKET).upload(path, file);
    if(upErr) throw upErr;
    const {error:rpcErr} = await sbClient.rpc('submit_worker_competency',{
      p_org_id: resolvedOrgId, p_competency_id: competencyId,
      p_file_path: path, p_file_name: file.name,
      p_worker_email: wpWorkerEmail
    });
    if(rpcErr) throw rpcErr;
    // Update local state so the card re-renders as pending
    wpCompRecords = (wpCompRecords||[]).filter(r=>r.competency_id!==competencyId);
    wpCompRecords.push({competency_id:competencyId,file_name:file.name,file_path:path,status:'pending',submitted_at:new Date().toISOString()});
    renderWPTraining();
  }catch(e){
    alert('Upload failed: '+(e.message||'unknown error'));
    if(btn) btn.style.opacity='';
    input.value='';
  }
}

// ── File download ──────────────────────────────────────────────────────────
async function wpDownloadFile(path, name){
  if(!sbClient||!path) return;
  const btn=event?.currentTarget;
  const origTxt=btn?.textContent;
  if(btn){btn.disabled=true;btn.textContent='…';}
  try{
    const {data,error}=await sbClient.storage.from(SB_BUCKET).createSignedUrl(path,300,{download:name||'document'});
    if(error||!data?.signedUrl) throw new Error(error?.message||'Could not create download link');
    window.location.href=data.signedUrl;
  }catch(e){ alert('Download failed: '+e.message); }
  finally{ if(btn){btn.disabled=false;btn.textContent=origTxt||'Download';} }
}
</script>
