<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Work Force Vault — My Documents</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1a3082;--navy-d:#112268;
  --accent:#7c3aed;--accent-d:#6d28d9;
  --text:#1a2340;--text-m:#4a5568;--text-l:#7a8ba8;
  --border:#dde3ec;--bg:#f1f5f9;
  --red:#c53030;--green:#276749;--amber:#92400e;
}
html,body{height:100%;font-family:'Inter',-apple-system,sans-serif;font-size:14px;background:var(--bg);color:var(--text);}
body{display:flex;flex-direction:column;min-height:100vh;}

/* ── Login ── */
#loginScreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;}
.login-card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.09);width:100%;max-width:400px;padding:36px 32px;}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.login-logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--navy));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.login-logo-text{font-size:17px;font-weight:800;color:#1e293b;letter-spacing:-.02em;}
.login-logo-sub{font-size:11px;color:#94a3b8;margin-top:1px;}
.login-title{font-size:21px;font-weight:800;color:#1e293b;margin-bottom:6px;}
.login-sub{font-size:13px;color:#64748b;margin-bottom:24px;line-height:1.55;}
.login-field label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;}
.login-field input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;color:#1e293b;outline:none;transition:border-color .15s;min-height:46px;}
.login-field input:focus{border-color:var(--accent);}
.login-btn{width:100%;margin-top:16px;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s;min-height:48px;}
.login-btn:hover{background:var(--accent-d);}
.login-btn:disabled{background:#c4b5fd;cursor:not-allowed;}
.login-msg{font-size:13px;padding:10px 14px;border-radius:7px;margin-top:14px;display:none;line-height:1.5;}
.login-msg.error{background:#fff5f5;color:var(--red);border:1px solid #fed7d7;}
.login-msg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
.login-note{font-size:12px;color:#94a3b8;margin-top:18px;line-height:1.55;padding:12px 14px;background:#f8fafc;border-radius:8px;border:1px solid #eef2f7;}
.login-footer{text-align:center;margin-top:20px;font-size:12px;color:#94a3b8;}
.login-footer a{color:#94a3b8;text-decoration:none;}
.login-footer a:hover{color:#475569;}

/* ── Vault app ── */
#vault{display:none;flex:1;flex-direction:column;}
.v-header{background:linear-gradient(135deg,var(--accent),var(--navy));padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:20;}
.v-header-title{font-size:15px;font-weight:800;color:#fff;white-space:nowrap;letter-spacing:.01em;}
.v-header-name{font-size:12px;color:rgba(255,255,255,.8);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
.v-signout-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;min-height:40px;white-space:nowrap;transition:background .15s;}
.v-signout-btn:active{background:rgba(255,255,255,.25);}
.v-tabs{display:flex;border-bottom:2px solid #e2e8f0;background:#fff;position:sticky;top:57px;z-index:19;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.v-tab{flex:1;min-width:80px;padding:14px 4px 12px;font-size:12px;font-weight:500;color:#64748b;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;text-align:center;white-space:nowrap;min-height:50px;transition:color .15s,border-color .15s;}
.v-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.v-tab:hover:not(.active){color:#334155;}
.v-body{max-width:680px;margin:0 auto;padding:20px 16px 48px;width:100%;}

/* ── Plan banner ── */
.v-plan-banner{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;margin-bottom:20px;font-size:13px;line-height:1.45;}
.v-plan-banner.free{background:#f5f3ff;border:1px solid #ddd6fe;color:#5b21b6;}
.v-plan-banner.vault{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
.v-plan-banner .v-upgrade-btn{margin-left:auto;flex-shrink:0;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;min-height:40px;white-space:nowrap;}
.v-plan-banner .v-upgrade-btn:active{background:var(--accent-d);}

/* ── Filter tabs ── */
.v-filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.v-filter-bar::-webkit-scrollbar{display:none;}
.v-filter-chip{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;white-space:nowrap;font-family:inherit;min-height:36px;transition:all .15s;}
.v-filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.v-filter-chip .vc{font-size:10px;opacity:.75;margin-left:3px;}
/* Coloured filter chips — inactive text hint, active fills with status colour */
.v-filter-chip.f-attention,.v-filter-chip.f-missing,.v-filter-chip.f-expired{color:#b91c1c;}
.v-filter-chip.f-attention.active,.v-filter-chip.f-missing.active,.v-filter-chip.f-expired.active{background:#fee2e2;color:#b91c1c;border-color:#fca5a5;}
.v-filter-chip.f-expiring{color:#92400e;}
.v-filter-chip.f-expiring.active{background:#fef3c7;color:#92400e;border-color:#fcd34d;}
.v-filter-chip.f-valid{color:#166534;}
.v-filter-chip.f-valid.active{background:#dcfce7;color:#166534;border-color:#86efac;}
.v-filter-chip.f-optional{color:#64748b;}
.v-filter-chip.f-optional.active{background:#f1f5f9;color:#475569;border-color:#cbd5e1;}

/* ── Section headings ── */
.v-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin:24px 0 10px;}
.v-section-title:first-child{margin-top:0;}

/* ── Doc cards ── */
.v-doc-row{padding:16px;background:#fff;border-radius:12px;margin-bottom:10px;border:1px solid #e2e8f0;}
.v-doc-top{display:flex;align-items:flex-start;gap:12px;}
.v-doc-icon{font-size:22px;flex-shrink:0;padding-top:2px;width:32px;text-align:center;}
.v-doc-info{flex:1;min-width:0;}
.v-doc-name{font-size:15px;font-weight:700;color:#1e293b;line-height:1.3;}
.v-status-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0;white-space:nowrap;}
.v-status-pill.ok{background:#dcfce7;color:#166534;}
.v-status-pill.expiring{background:#fef3c7;color:#92400e;}
.v-status-pill.missing{background:#fee2e2;color:#b91c1c;}
.v-status-pill.expired{background:#fee2e2;color:#991b1b;}
.v-expiry-tag{font-size:12px;color:#64748b;margin-top:5px;}
.v-verified-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;background:#ede9fe;color:#6d28d9;border:1px solid #ddd6fe;margin-top:6px;}
.v-download-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:9px 16px;background:#f5f3ff;color:var(--accent);border:1.5px solid #ddd6fe;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;min-height:42px;font-family:inherit;transition:background .15s;}
.v-download-btn:active{background:#ede9fe;}
.v-download-btn.locked{background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;cursor:pointer;}
.v-doc-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.v-mini-btn{padding:7px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid #e2e8f0;background:#fff;color:#475569;min-height:36px;transition:background .15s;}
.v-mini-btn:active{background:#f1f5f9;}
.v-mini-btn.danger{color:#b91c1c;border-color:#fecaca;background:#fff5f5;}
.v-mini-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ── Submission banners ── */
.v-pending-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;background:#fef3c7;color:#92400e;border:1px solid #fde68a;margin-top:6px;}
.v-rejected-notice{margin-top:8px;padding:10px 12px;background:#fff5f5;border:1px solid #fecaca;border-radius:8px;font-size:12px;color:#b91c1c;line-height:1.5;}
.v-issued-banner{margin-top:8px;padding:10px 12px;border-radius:8px;font-size:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;line-height:1.4;}
.v-issued-banner.signed{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
.v-issued-banner.pending-sig{background:#fef3c7;border:1px solid #fde68a;color:#92400e;}
.v-issued-banner button{background:none;border:none;font-size:12px;font-weight:700;color:inherit;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0;white-space:nowrap;}
.v-tpl-link{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:12px;color:var(--accent);font-weight:600;cursor:pointer;text-decoration:none;}

/* ── Submit inline form — matches worker portal exactly ── */
.wp-doc-row{padding:16px;background:#fff;border-radius:12px;margin-bottom:10px;border:1px solid #e2e8f0;transition:box-shadow .15s;position:relative;}
.wp-doc-top{display:flex;align-items:flex-start;gap:12px;}
.wp-doc-icon{font-size:22px;flex-shrink:0;padding-top:2px;width:32px;text-align:center;}
.wp-doc-info{flex:1;min-width:0;}
.wp-doc-name-row{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.wp-doc-name{font-size:15px;font-weight:700;color:#1e293b;line-height:1.3;}
.wp-doc-meta-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:4px;}
.wp-doc-tip{font-size:12px;color:#64748b;font-style:italic;margin-top:6px;line-height:1.4;}
.wp-expiry-tag{font-size:12px;color:#64748b;white-space:nowrap;}
.wp-status-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;margin-top:4px;}
.wp-status-pill.ok{background:#dcfce7;color:#166534;}
.wp-status-pill.expiring{background:#fef3c7;color:#92400e;}
.wp-status-pill.missing{background:#fee2e2;color:#b91c1c;}
.wp-status-pill.expired{background:#fee2e2;color:#991b1b;}
.wp-status-pill.opt-neutral{background:#f1f5f9;color:#475569;}
.wp-req-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;background:#ffe4e6;color:#be123c;border:1px solid #fecdd3;margin-left:6px;vertical-align:middle;letter-spacing:.02em;}
.wp-opt-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;margin-left:6px;vertical-align:middle;}
.wp-pending-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;background:#fef3c7;color:#92400e;border:1px solid #fcd34d;margin-top:8px;}
.wp-rejected-notice{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:8px;padding:8px 12px;margin-top:8px;}
.wp-rejected-notice-label{font-size:11px;font-weight:700;color:#b91c1c;margin-bottom:3px;}
.wp-rejected-notice-text{font-size:12px;color:#7f1d1d;line-height:1.45;}
.wp-template-banner{display:flex;align-items:center;gap:10px;margin-top:10px;padding:10px 12px;background:#fffbeb;border:1.5px solid #f59e0b;border-radius:8px;}
.wp-card-actions{position:absolute;top:12px;right:12px;display:flex;align-items:center;gap:6px;z-index:1;}
.wp-card-icon-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b;cursor:pointer;text-decoration:none;transition:background .15s,color .15s;padding:0;flex-shrink:0;font-family:inherit;}
.wp-card-icon-btn:hover,.wp-card-icon-btn:active{background:#e2e8f0;color:#1e293b;}
.wp-info-panel{font-size:13px;color:#334155;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:10px 12px;margin-top:10px;line-height:1.6;}
.wp-template-banner-text{flex:1;min-width:0;}
.wp-template-banner-label{font-size:12px;font-weight:700;color:#78350f;}
.wp-template-banner-sub{font-size:11px;color:#92400e;margin-top:1px;}
.wp-template-dl-btn{flex-shrink:0;padding:6px 12px;background:#f59e0b;border:none;border-radius:6px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;transition:background .15s;font-family:inherit;}
.wp-template-dl-btn:hover{background:#d97706;}
.wp-doc-btn{display:block;width:100%;margin-top:14px;padding:13px 16px;background:#059669;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;min-height:48px;transition:background .15s;font-family:inherit;}
.wp-doc-btn:active{background:#047857;}
.wp-doc-btn.cancel{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;}
.wp-doc-btn.cancel:active{background:#e2e8f0;}
.wp-doc-btn-secondary{display:block;width:100%;margin-top:8px;padding:9px 16px;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;min-height:40px;transition:background .15s;font-family:inherit;}
.wp-submit-form{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-top:14px;display:flex;flex-direction:column;gap:12px;}
.wp-submit-form label{font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:4px;}
.wp-submit-form input,.wp-submit-form .wp-form-input{width:100%;max-width:100%;box-sizing:border-box;min-height:46px;font-size:15px;-webkit-appearance:none;appearance:none;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;color:#1e293b;outline:none;transition:border-color .15s;}
.wp-submit-form input:focus{border-color:#1e293b;}
.wp-submit-form input[type=file]{min-height:46px;padding:8px;font-size:14px;}
.wp-submit-row{display:flex;gap:10px;}
.wp-submit-row .wp-doc-btn{flex:1;margin-top:0;}
/* ── Legacy vault submit form (keep for return form compatibility) ── */
.v-sf-row{display:flex;gap:10px;margin-bottom:8px;}
.v-sf-row .v-sf-field{flex:1;}
.v-sf-field{margin-bottom:8px;}
.v-sf-field label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:4px;}
.v-sf-field input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;color:#1e293b;outline:none;min-height:40px;}
.v-sf-field input:focus{border-color:var(--accent);}
.v-sf-actions{display:flex;gap:8px;margin-top:4px;}
.v-sf-actions button{flex:1;}

/* ── Org sections ── */
.v-org-section{margin-bottom:32px;}
.v-org-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:linear-gradient(90deg,#f5f3ff,#f8fafc);border-radius:12px;border:1px solid #ddd6fe;margin-bottom:14px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.v-org-header-name{font-size:14px;font-weight:800;color:#1e293b;}
.v-org-header-sub{font-size:11px;color:#7c3aed;margin-top:2px;font-weight:600;}
.v-org-header-sub .v-urgent{color:#b91c1c;}
.v-cat-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:0 2px;margin:18px 0 8px;}
.v-cat-header:first-of-type{margin-top:0;}
.v-cat-header.cat-action{color:#b91c1c;}
.v-cat-header.cat-expiring{color:#92400e;}
.v-cat-header.cat-valid{color:#166534;}
.v-cat-header.cat-optional{color:#94a3b8;}
.v-doc-urgent{border-left:3px solid #fca5a5;}
.v-doc-expiring{border-left:3px solid #fde68a;}
.v-org-chevron{font-size:13px;margin-left:auto;color:#7c3aed;flex-shrink:0;transition:transform .2s;}
.v-org-filter-bar{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:6px;}
.v-org-filter-bar::-webkit-scrollbar{display:none;}

/* ── Assignments ── */
.v-assign-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.v-assign-card:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(124,58,237,.1);}
.v-assign-title{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.v-assign-meta{font-size:13px;color:#64748b;line-height:1.6;}
.v-contract-flag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;margin-top:8px;}
.v-contract-flag.missing{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;}
.v-contract-flag.signed{background:#dcfce7;color:#166534;border:1px solid #86efac;}
.v-contract-flag.present{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;}
.v-assign-hint{font-size:11px;color:#94a3b8;margin-top:8px;}

/* ── Detail panel ── */
.v-detail-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:40;display:none;}
.v-detail-overlay.open{display:block;}
.v-detail-panel{position:fixed;right:0;top:0;bottom:0;width:min(440px,100%);background:#fff;z-index:41;overflow-y:auto;box-shadow:-4px 0 28px rgba(0,0,0,.14);transform:translateX(100%);transition:transform .25s ease;}
.v-detail-panel.open{transform:translateX(0);}
.v-detail-hd{background:linear-gradient(135deg,var(--accent),var(--navy));padding:16px 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.v-detail-close{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;min-height:36px;font-family:inherit;font-weight:600;}
.v-detail-bd{padding:18px;}
.v-kv{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid #f1f5f9;font-size:13px;gap:12px;}
.v-kv:last-child{border-bottom:none;}
.v-kv-label{color:#64748b;font-weight:500;flex-shrink:0;}
.v-kv-val{color:#1e293b;font-weight:600;text-align:right;}

/* ── Resource cards ── */
.v-resource-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:10px;}
.v-resource-top{display:flex;align-items:flex-start;gap:12px;}
.v-resource-icon{font-size:22px;flex-shrink:0;width:32px;text-align:center;padding-top:2px;}
.v-resource-info{flex:1;min-width:0;}
.v-resource-name{font-size:15px;font-weight:700;color:#1e293b;}
.v-resource-meta{font-size:12px;color:#64748b;margin-top:4px;line-height:1.55;}
.v-resource-active{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:8px;font-size:10px;font-weight:700;background:#dcfce7;color:#166534;border:1px solid #86efac;margin-top:5px;}
.v-resource-ended{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:8px;font-size:10px;font-weight:700;background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;margin-top:5px;}

<script>
// ══════════════════════════════════════════════════════════════════════════
// BRAND — single source of truth for all product-name / contact / colour refs.

// ── UI helpers ──────────────────────────────────────────────────────────────
function icon(name, size=16){
  return `<i data-lucide="${name}" style="width:${size}px;height:${size}px;"></i>`;
}
function orgAvatar(name, tint=false){
  const words = (name||'?').trim().split(/\s+/);
  const initials = words.length>=2 ? words[0][0]+words[1][0] : (words[0]||'?').slice(0,2);

}
function statusDot(status){
  const labels={ok:'Valid',expiring:'Expiring soon',expired:'Expired',missing:'Not on file'};
  return `<span class="v-sdot ${status}">${labels[status]||status}</span>`;
}
function setBody(html){
  $('vBody').innerHTML = html;
  if(window.lucide) lucide.createIcons();
}
function setModal(html){
  $('vModal').innerHTML = html;
  if(window.lucide) lucide.createIcons();
}

const SUPABASE_URL  = 'https://gmuyvostwcqorspgzvjv.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtdXl2b3N0d2Nxb3JzcGd6dmp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NTE5NjgsImV4cCI6MjA5NDQyNzk2OH0.XHzdr_9_MZXtv1UJW58y7qUq-_mhvWyb56KQi9RHfR8';
const SB_BUCKET     = 'tmc-documents';
const WARNING_DAYS  = 60;

renderLoginForm('');

(function(){

// ── Helpers ─────────────────────────────────────────────────────────────────
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s){ if(!s) return ''; try{ return new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }catch(e){ return s; } }
function todayMidnight(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function $(id){ return document.getElementById(id); }

function applyBrand(){
  $('brandName').textContent   = BRAND.vaultName;
  $('vBrandTitle').textContent = BRAND.vaultName;
  document.title = BRAND.vaultName + ' — My Documents';
}

function vaultDocStatus(doc){
  const hasFile = doc.has_file || (doc.status && doc.status!=='missing');
  if(!hasFile) return 'missing';
  if(!doc.expiry_date) return 'ok';
  const expiry = new Date(doc.expiry_date); expiry.setHours(0,0,0,0);
  const ref = todayMidnight();
  if(expiry < ref) return 'expired';
  if((expiry - ref)/86400000 <= WARNING_DAYS) return 'expiring';
  return 'ok';
}
function fileStatusByExpiry(expiry){
  if(!expiry) return 'ok';
  const e = new Date(expiry); e.setHours(0,0,0,0);
  const ref = todayMidnight();
  if(e < ref) return 'expired';
  if((e - ref)/86400000 <= WARNING_DAYS) return 'expiring';
  return 'ok';
}
function statusLabel(s){ return {ok:'Valid',expiring:'Expiring soon',expired:'Expired',missing:'Not on file'}[s] || s; }
const STATUS_RANK = { ok:3, expiring:2, expired:1, missing:0 };

// Extract doc_key from a doc_set_items row (direct .doc_key field, or fallback parsing .id)
function extractDocKey(it){
  if(it.doc_key) return it.doc_key;
  const id = String(it.id||'');
  return id.includes('__') ? id.split('__').pop() : id;
}

// Build categorized items for a membership
function categorizeMembership(m){
  const wdByKey = {};
  for(const d of (m.worker_docs||[])) if(d.doc_key) wdByKey[d.doc_key] = d;

  const allItems = (m.doc_set_items||[]).map(it => {
    const key = extractDocKey(it);
    const wd  = wdByKey[key] || null;
    return {
      key, name: it.name||key, icon: it.icon||'📄',
      required: it.required !== false,
      tip: it.tip||'', info_text: it.info_text||'', info_url: it.info_url||'',
      template_file_path: it.template_file_path||'', template_file_name: it.template_file_name||'',
      status: wd ? vaultDocStatus(wd) : 'missing',
      expiry: wd ? wd.expiry_date : null,
      issue_date: wd ? wd.issue_date : null,
      wd,
    };
  });

  const setKeys = new Set(allItems.map(i=>i.key));
  const extraItems = (m.worker_docs||[])
    .filter(d=>d.doc_key && !setKeys.has(d.doc_key) && d.has_file)
    .map(d=>({ key:d.doc_key, name:d.doc_key, icon:'📄', required:false, tip:'', info_text:'', info_url:'',
               template_file_path:'', template_file_name:'',
               status:vaultDocStatus(d), expiry:d.expiry_date, issue_date:d.issue_date, wd:d }));

  const reqMissing = allItems.filter(i=>i.required && i.status==='missing');
  const expired    = [...allItems.filter(i=>i.status==='expired'), ...extraItems.filter(i=>i.status==='expired')];
  const expiring   = [...allItems.filter(i=>i.status==='expiring'), ...extraItems.filter(i=>i.status==='expiring')];
  const valid      = [...allItems.filter(i=>i.status==='ok'), ...extraItems.filter(i=>i.status==='ok')];
  const optMissing = allItems.filter(i=>!i.required && i.status==='missing');

  return { reqMissing, expired, expiring, valid, optMissing };
}

// ── Boot / auth ─────────────────────────────────────────────────────────────
async function boot(){
  applyBrand();
  wireLogin();
  const { data:{ session } } = await sbClient.auth.getSession();
  if(session){ enterVault(); }
  else { showLogin(); }
  sbClient.auth.onAuthStateChange((evt, sess) => {
    if(evt === 'PASSWORD_RECOVERY'){
      // User clicked a password-reset link — show the set-new-password form
      _loginMode = 'setpw';
      showLogin();
      renderLoginForm('', 'Reset link verified — choose a new password below.', 'ok');
      return;
    }
    if(evt === 'SIGNED_IN' && sess){ enterVault(); }
    if(evt === 'SIGNED_OUT'){ _loginMode='signin'; showLogin(); }
  });
}

function showLogin(){
  $('vault').style.display = 'none';
  $('loginScreen').style.display = 'flex';
}

function wireLogin(){
  const qEmail = new URLSearchParams(location.search).get('email') || '';
  $('signOutBtn').onclick = async ()=>{ await sbClient.auth.signOut(); vaultData=null; };
  renderLoginForm(qEmail);
  wireTabNav();
}

function renderLoginForm(prefillEmail, prefillMsg, prefillMsgKind){
  const form = $('loginForm');
  if(!form) return;
  const redirectTo = location.origin + location.pathname;

  function html(mode){
    const fld = (id,type,label,ph,ac,val='')=>
      '<div class="login-field"><label for="lf_'+id+'">'+label+'</label>'
      +'<input id="lf_'+id+'" type="'+type+'" autocomplete="'+ac+'" placeholder="'+ph+'" value="'+esc(val)+'" style="font-size:16px!important;"/></div>';
    const pwToggle = '<button type="button" onclick="toggleLoginPw(\'lf_pw\')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;padding:0;min-height:auto;" aria-label="Show/hide password">👁</button>';
    const pwToggle2 = '<button type="button" onclick="toggleLoginPw(\'lf_pw2\')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;padding:0;min-height:auto;" aria-label="Show/hide password">👁</button>';

    if(mode==='signup') return ''
      +'<div class="login-title">Create your vault</div>'
      +'<div class="login-sub">Choose a password to protect your vault. You can also always use a magic link to sign in.</div>'
      +fld('email','email','Email address','you@example.com','email',prefillEmail)
      +'<div class="login-field" style="position:relative;"><label for="lf_pw">Password</label>'
      +'<input id="lf_pw" type="password" autocomplete="new-password" placeholder="At least 8 characters" style="font-size:16px!important;padding-right:42px;"/>'+pwToggle+'</div>'
      +'<div class="login-field" style="position:relative;"><label for="lf_pw2">Confirm password</label>'
      +'<input id="lf_pw2" type="password" autocomplete="new-password" placeholder="Same again" style="font-size:16px!important;padding-right:42px;"/>'+pwToggle2+'</div>'
      +'<button class="login-btn" id="lf_btn" onclick="loginAction()">Create account</button>'
      +'<div class="login-msg" id="lf_msg" style="display:none;"></div>'
      +'<div style="text-align:center;margin-top:14px;font-size:13px;color:#64748b;">'
      +'Already have an account? <a href="#" style="color:var(--accent);font-weight:600;" onclick="switchLoginMode(\'signin\');return false;">Sign in</a></div>';

    if(mode==='forgot') return ''
      +'<div class="login-title">Reset your password</div>'
      +'<div class="login-sub">Enter your email and we\'ll send a password reset link. Or use the magic link below to sign in directly.</div>'
      +fld('email','email','Email address','you@example.com','email',prefillEmail)
      +'<button class="login-btn" id="lf_btn" onclick="loginAction()">Send reset link</button>'
      +'<div class="login-msg" id="lf_msg" style="display:none;"></div>'
      +'<div style="text-align:center;margin-top:14px;font-size:13px;color:#64748b;">'
      +'<a href="#" style="color:var(--accent);font-weight:600;" onclick="switchLoginMode(\'signin\');return false;">← Back to sign in</a></div>'
      +'<div class="login-field" style="margin-top:16px;padding-top:16px;border-top:1px solid #e2e8f0;">'
      +'<button id="lf_ml" onclick="sendMagicLink()" style="width:100%;padding:11px;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;min-height:44px;">Send magic link instead</button></div>';

    if(mode==='setpw') return ''
      +'<div class="login-title">Set a new password</div>'
      +'<div class="login-sub">Choose a new password for your vault account.</div>'
      +'<div class="login-field" style="position:relative;"><label for="lf_pw">New password</label>'
      +'<input id="lf_pw" type="password" autocomplete="new-password" placeholder="At least 8 characters" style="font-size:16px!important;padding-right:42px;"/>'+pwToggle+'</div>'
      +'<div class="login-field" style="position:relative;"><label for="lf_pw2">Confirm new password</label>'
      +'<input id="lf_pw2" type="password" autocomplete="new-password" placeholder="Same again" style="font-size:16px!important;padding-right:42px;"/>'+pwToggle2+'</div>'
      +'<button class="login-btn" id="lf_btn" onclick="loginAction()">Update password</button>'
      +'<div class="login-msg" id="lf_msg" style="display:none;"></div>';

    // default: signin
    return ''
      +'<div class="login-title">Sign in to your vault</div>'
      +'<div class="login-sub">Use your email and password, or sign in with a magic link.</div>'
      +fld('email','email','Email address','you@example.com','email',prefillEmail)
      +'<div class="login-field" style="position:relative;"><label for="lf_pw">Password</label>'
      +'<input id="lf_pw" type="password" autocomplete="current-password" placeholder="Your password" style="font-size:16px!important;padding-right:42px;"/>'+pwToggle+'</div>'
      +'<button class="login-btn" id="lf_btn" onclick="loginAction()">Sign in</button>'
      +'<div class="login-msg" id="lf_msg" style="display:none;"></div>'
      +'<div style="display:flex;justify-content:space-between;margin-top:12px;font-size:13px;">'
      +'<a href="#" style="color:#64748b;" onclick="switchLoginMode(\'signup\');return false;">New here? Create account</a>'
      +'<a href="#" style="color:var(--accent);font-weight:600;" onclick="switchLoginMode(\'forgot\');return false;">Forgot password?</a></div>'
      +'<div style="display:flex;align-items:center;gap:10px;margin:16px 0;"><div style="flex:1;height:1px;background:#e2e8f0;"></div><span style="font-size:11px;font-weight:600;color:#94a3b8;white-space:nowrap;">OR</span><div style="flex:1;height:1px;background:#e2e8f0;"></div></div>'
      +'<button id="lf_ml" onclick="sendMagicLink()" style="width:100%;padding:11px;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;min-height:44px;">Send magic link</button>'
      +'<div class="login-note" style="margin-top:14px;">🔒 Stay signed in for <b>30 days</b>. Avoid private/incognito if you want to stay logged in.</div>';
  }

  form.innerHTML = html(_loginMode);
  if(prefillMsg) setLoginMsg(prefillMsg, prefillMsgKind||'ok');

  // Enter key on password fires sign in
  const pw = $('lf_pw');
  if(pw) pw.onkeydown = (e)=>{ if(e.key==='Enter') loginAction(); };
  const em = $('lf_email');
  if(em) em.onkeydown = (e)=>{ if(e.key==='Enter'){ if(_loginMode==='forgot') sendMagicLink(); else loginAction(); } };
}

function switchLoginMode(mode){ _loginMode = mode; renderLoginForm($('lf_email')&&$('lf_email').value||''); }
function toggleLoginPw(id){ const el=$(id); if(el) el.type = el.type==='password'?'text':'password'; }
function setLoginMsg(text, kind){ const m=$('lf_msg'); if(!m) return; m.textContent=text; m.className='login-msg '+kind; m.style.display=text?'block':'none'; }

async function loginAction(){
  const email = ($('lf_email')&&$('lf_email').value||'').trim();
  const pw    = $('lf_pw')&&$('lf_pw').value||'';
  const pw2   = $('lf_pw2')&&$('lf_pw2').value||'';
  const btn   = $('lf_btn');
  setLoginMsg('','');

  if(_loginMode === 'setpw'){
    if(pw.length < 8){ setLoginMsg('Password must be at least 8 characters.','error'); return; }
    if(pw !== pw2){ setLoginMsg('Passwords don\'t match.','error'); return; }
    if(btn){ btn.disabled=true; btn.textContent='Updating…'; }
    try{
      const { error } = await sbClient.auth.updateUser({ password: pw });
      if(error) throw error;
      setLoginMsg('✓ Password updated. Signing you in…','ok');
      setTimeout(()=>enterVault(), 1200);
    }catch(e){ setLoginMsg('Could not update password: '+(e.message||'unknown error'),'error'); }
    finally{ if(btn){ btn.disabled=false; btn.textContent='Update password'; } }
    return;
  }

  if(!email||!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ setLoginMsg('Please enter a valid email address.','error'); return; }

  if(_loginMode === 'forgot'){
    if(btn){ btn.disabled=true; btn.textContent='Sending…'; }
    try{
      const { error } = await sbClient.auth.resetPasswordForEmail(email, { redirectTo: location.origin+location.pathname });
      if(error) throw error;
      setLoginMsg('✓ Reset link sent — check your email. Click it to set a new password.','ok');
    }catch(e){ setLoginMsg('Could not send reset link: '+(e.message||'unknown error'),'error'); }
    finally{ if(btn){ btn.disabled=false; btn.textContent='Send reset link'; } }
    return;
  }

  if(_loginMode === 'signup'){
    if(pw.length < 8){ setLoginMsg('Password must be at least 8 characters.','error'); return; }
    if(pw !== pw2){ setLoginMsg('Passwords don\'t match.','error'); return; }
    if(btn){ btn.disabled=true; btn.textContent='Creating account…'; }
    try{
      const { error } = await sbClient.auth.signUp({ email, password:pw, options:{ emailRedirectTo: location.origin+location.pathname } });
      if(error) throw error;
      setLoginMsg('✓ Account created! Check your email for a confirmation link, then sign in.','ok');
      setTimeout(()=>switchLoginMode('signin'), 3000);
    }catch(e){ setLoginMsg('Could not create account: '+(e.message||'unknown error'),'error'); }
    finally{ if(btn){ btn.disabled=false; btn.textContent='Create account'; } }
    return;
  }

  // signin
  if(!pw){ setLoginMsg('Please enter your password.','error'); return; }
  if(btn){ btn.disabled=true; btn.textContent='Signing in…'; }
  try{
    const { error } = await sbClient.auth.signInWithPassword({ email, password:pw });
    if(error) throw error;
    // enterVault() will be triggered by onAuthStateChange SIGNED_IN event
  }catch(e){ setLoginMsg('Could not sign in: '+(e.message||'unknown error'),'error'); }
  finally{ if(btn){ btn.disabled=false; btn.textContent='Sign in'; } }
}

async function sendMagicLink(){
  const email = ($('lf_email')&&$('lf_email').value||'').trim();
  if(!email||!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ setLoginMsg('Please enter your email address first.','error'); return; }
  const btn = $('lf_ml');
  if(btn){ btn.disabled=true; btn.textContent='Sending…'; }
  try{
    const { error } = await sbClient.auth.signInWithOtp({ email, options:{ emailRedirectTo: location.origin+location.pathname } });
    if(error) throw error;
    setLoginMsg('✓ Magic link sent — check your email to sign in.','ok');
  }catch(e){ setLoginMsg('Could not send link: '+(e.message||'unknown error'),'error'); }
  finally{ if(btn){ btn.disabled=false; btn.textContent='Send magic link'+((_loginMode==='forgot')?'instead':''); } }
}

function wireTabNav(){
  document.querySelectorAll('.v-tab').forEach(t=>{
    t.onclick = ()=>{
      const prev = activeTab;
      activeTab = t.dataset.tab;
      if(prev !== 'docs' && activeTab === 'docs'){ _orgsInitialized = false; }
      document.querySelectorAll('.v-tab').forEach(x=>x.classList.toggle('active', x===t));
      renderBody();
    };
  });
}

async function enterVault(){
  $('loginScreen').style.display = 'none';
  $('vault').style.display = 'flex';
  $('vBody').innerHTML = '<div class="v-loading">Loading your vault…</div>';
  try{
    await sbClient.rpc('ensure_vault_account');
    const { data, error } = await sbClient.rpc('get_vault_portal');
    if(error) throw error;
    vaultData = data;
    $('vWorkerName').textContent = (data && data.account && data.account.full_name) || '';
    renderBody();
    handlePostCheckout();
    backfillVaultCopies();
  }catch(e){
    $('vBody').innerHTML = '<div class="v-empty"><div class="v-empty-icon">⚠️</div>'
      +'We couldn\'t load your vault.<br><span style="font-size:12px;">'+esc(e.message||'')+'</span><br><br>'
      +'If you were just invited, your records may still be linking. Try signing out and back in, '
      +'or contact <a href="mailto:'+BRAND.supportEmail+'">'+BRAND.supportEmail+'</a>.</div>';
  }
}

function isPaid(){ return vaultData && vaultData.account && vaultData.account.plan==='vault'; }

// ── Main render ──────────────────────────────────────────────────────────────
function renderBody(){
  if(!vaultData) return;
  closeDetail();
  if(activeTab==='docs')        renderDocs();
  else if(activeTab==='assignments') renderAssignments();
  else if(activeTab==='resources')   renderResources();
  else if(activeTab==='files')       renderFiles();
  else if(activeTab==='account')     renderAccount();
}

function planBanner(){
  if(isPaid()){
    return '<div class="v-plan-banner vault">'+icon('shield-check',16)
      +' <div>You\'re on <b>Vault</b> — download and share any document, anytime.</div>'
      +'<button class="v-upgrade-btn" onclick="openShareModal()" style="display:inline-flex;align-items:center;gap:6px;">'
      +icon('share-2',14)+' Share</button></div>';
  }
  return '<div class="v-plan-banner free">'+icon('lock',16)
    +' <div><b>Free plan.</b> You can see all your documents and their status. '
    +'Upgrade to <b>Vault</b> to download them and send them to anyone.</div>'
    +'<button class="v-upgrade-btn" onclick="onUpgrade()" style="display:inline-flex;align-items:center;gap:6px;">'
    +icon('arrow-up-right',14)+' Upgrade</button></div>';
}

// ── DOCUMENTS TAB ────────────────────────────────────────────────────────────
function setDocFilter(f){ docFilter = f; renderDocs(); }

function toggleOrg(orgIdx){
  if(expandedOrgs.has(orgIdx)) expandedOrgs.delete(orgIdx);
  else expandedOrgs.add(orgIdx);
  renderDocs();
}

function setOrgFilter(orgIdx, f){
  orgFilters[orgIdx] = f;
  renderDocs();
}

function renderDocs(){
  const memberships = vaultData.memberships || [];
  if(!memberships.length){
    $('vBody').innerHTML = planBanner()+'<div class="v-empty"><div class="v-empty-icon">📭</div>'
      +'No linked organisations yet.<br><span style="font-size:12px;">When an employer invites you, your compliance documents appear here.</span></div>';
    return;
  }

  // Pre-categorize all orgs
  const orgData = memberships.map((m, orgIdx) => ({ m, orgIdx, ...categorizeMembership(m) }));

  // Expand all orgs only on the very first render — not when user has collapsed them all
  if(!_orgsInitialized){
    orgData.forEach(d => expandedOrgs.add(d.orgIdx));
    _orgsInitialized = true;
  }

  let html = planBanner();

  for(const {m, orgIdx, reqMissing, expired, expiring, valid, optMissing} of orgData){
    const totalReq  = (m.doc_set_items||[]).filter(it=>it.required!==false).length;
    const urgentCnt = reqMissing.length + expired.length;
    const isExpanded = expandedOrgs.has(orgIdx);

    // Build lookups for this org
    const submByKey = {}, issuedByKey = {}, filesByKey = {};
    for(const s of (m.submissions||[])) if(!submByKey[s.doc_key]) submByKey[s.doc_key] = s;
    for(const d of (m.issued_docs||[])) if(!issuedByKey[d.doc_key]) issuedByKey[d.doc_key] = d;
    for(const f of (m.worker_doc_files||[])) if(!filesByKey[f.doc_key]) filesByKey[f.doc_key] = f;

    html += '<div class="v-org-section">';

    // Clickable org header
    html += '<div class="v-org-header" onclick="toggleOrg('+orgIdx+')">'
      + orgAvatar(m.org_name)
      +'<div style="flex:1;min-width:0;">'
      +'<div class="v-org-header-name">'+esc(m.org_name)+'</div>'
      +'<div class="v-org-header-sub">'+totalReq+' required · '+valid.length+' valid'
      +(urgentCnt ? ' · <span class="v-urgent">'+urgentCnt+' need attention</span>' : '')
      +'</div></div>'
      + icon(isExpanded?'chevron-down':'chevron-right', 18)
      +'</div>';

    if(isExpanded){
      const urgentDefault = (reqMissing.length + expired.length) > 0 ? 'attention' : 'all';
      const f = orgFilters[orgIdx] || urgentDefault;
      const allCnt = reqMissing.length + expired.length + expiring.length + valid.length + optMissing.length;

      // Per-org filter chips — only show chips with items (plus always show All + active filter)
      const ofc = (fval, label, cnt, colorCls) => {
        if(cnt === 0 && fval !== 'all' && fval !== f) return '';
        const a = f===fval ? ' active' : '';
        const cs = cnt ? '<span class="vc">'+cnt+'</span>' : '';
        const cc = colorCls ? ' '+colorCls : '';
        return '<button class="v-filter-chip'+a+cc+'" onclick="setOrgFilter('+orgIdx+',\''+fval+'\');event.stopPropagation()">'+label+cs+'</button>';
      };
      html += '<div class="v-org-filter-bar">'
        + ofc('all','All',allCnt)
        + ofc('attention','Needs attention',urgentCnt,'f-attention')
        + ofc('expiring','Expiring',expiring.length,'f-expiring')
        + ofc('valid','Valid',valid.length,'f-valid')
        + ofc('optional','Optional',optMissing.length,'f-optional')
        + '</div>';

      // Build doc groups based on per-org filter
      let groups;
      if(f==='all'){
        groups = [
          {label:'⚠ Required — not on file', cls:'cat-action',   items:reqMissing, variant:'urgent'},
          {label:'✕ Expired',                cls:'cat-action',   items:expired,    variant:'urgent'},
          {label:'🕐 Expiring soon',          cls:'cat-expiring', items:expiring,   variant:'expiring'},
          {label:'✓ Valid',                   cls:'cat-valid',   items:valid,       variant:''},
          {label:'○ Optional — not on file', cls:'cat-optional', items:optMissing,  variant:''},
        ];
      } else if(f==='attention'){
        groups = [
          {label:'⚠ Required — not on file', cls:'cat-action', items:reqMissing, variant:'urgent'},
          {label:'✕ Expired',                cls:'cat-action', items:expired,    variant:'urgent'},
        ];
      } else if(f==='expiring'){
        groups = [{label:'🕐 Expiring soon', cls:'cat-expiring', items:expiring, variant:'expiring'}];
      } else if(f==='valid'){
        groups = [{label:'✓ Valid', cls:'cat-valid', items:valid, variant:''}];
      } else if(f==='optional'){
        groups = [{label:'○ Optional — not on file', cls:'cat-optional', items:optMissing, variant:''}];
      }

      const totalVisible = groups.reduce((s,g)=>s+g.items.length, 0);
      if(!totalVisible){
        html += '<p style="font-size:13px;color:#94a3b8;padding:4px 2px 12px;">'
          +(f==='all' ? 'No documents on record yet for this employer.' : 'No documents in this category.')
          +'</p>';
      } else {
        for(const g of groups){
          if(!g.items.length) continue;
          html += '<div class="v-cat-header '+g.cls+'">'+g.label+'</div>';
          for(const item of g.items) html += docCard(item, g.variant, orgIdx, submByKey, issuedByKey, filesByKey);
        }
      }
    }

    html += '</div>'; // end v-org-section
  }

  html += '<div class="v-disclaimer">Status reflects the expiry date on file with your employer. Submit updated documents when yours expire.</div>';
  setBody(html);
}

function docCard(item, variant, orgIdx, submByKey, issuedByKey, filesByKey){
  const st      = item.status;
  const hasFile = !!(item.wd && item.wd.has_file);
  const leftBorder = variant==='urgent' ? 'border-left:3px solid #fca5a5;' : variant==='expiring' ? 'border-left:3px solid #fde68a;' : '';
  const sfId    = 'sf_'+orgIdx+'_'+item.key.replace(/[^a-z0-9]/g,'_');
  const sub     = submByKey[item.key];
  const issued  = issuedByKey[item.key];
  const orgFile = filesByKey[item.key];
  const hasInfo = !!(item.info_text || item.info_url);
  const infoId  = 'ip_'+orgIdx+'_'+item.key.replace(/[^a-z0-9]/g,'_');

  // Status pill (worker portal style)
  const pillLabels = { ok:'Valid', expiring:'Expiring', expired:'Expired', missing:'Not on file' };
  const pillCls = st==='ok' ? 'ok' : st==='expiring' ? 'expiring' : st==='expired' ? 'expired' : 'missing';
  const statusPill = '<span class="wp-status-pill '+(item.required ? pillCls : 'opt-neutral')+'">'+(pillLabels[st]||st)+'</span>';

  // Card action buttons (top-right, absolute) — info toggle + download/lock
  let actionBtns = '';
  if(hasInfo){
    actionBtns += '<button class="wp-card-icon-btn" title="More info" onclick="event.stopPropagation();toggleInfoPanel(\''+infoId+'\')">'
      +icon('info',14)+'</button>';
  }
  if(hasFile && isPaid() && orgFile){
    actionBtns += '<button class="wp-card-icon-btn" title="View document" onclick="event.stopPropagation();downloadOrgFile(\''+esc(orgFile.file_path)+'\',\''+esc(orgFile.file_name)+'\',event)">'
      +icon('download',14)+'</button>';
  } else if(hasFile && !isPaid()){
    actionBtns += '<button class="wp-card-icon-btn" title="Vault plan required" onclick="event.stopPropagation();onUpgrade()">'
      +icon('lock',14)+'</button>';
  }
  const cardActions = actionBtns ? '<div class="wp-card-actions">'+actionBtns+'</div>' : '';
  const btnCount = actionBtns ? (actionBtns.match(/wp-card-icon-btn/g)||[]).length : 0;
  const topPadding = btnCount > 0 ? ' style="padding-right:'+(btnCount*34+12)+'px;"' : '';

  // Top section: icon + name/status only
  let body = cardActions
    +'<div class="wp-doc-top"'+topPadding+'>'
    +'<div class="wp-doc-icon">'+(item.icon||'📄')+'</div>'
    +'<div class="wp-doc-info">'
    +'<div class="wp-doc-name-row">'
    +'<span class="wp-doc-name">'+esc(item.name)+'</span>'
    +(item.required ? '<span class="wp-req-badge">Required</span>' : '<span class="wp-opt-badge">Optional</span>')
    +'</div>'
    +'<div class="wp-doc-meta-row">'
    + statusPill
    +(item.expiry ? '<span class="wp-expiry-tag">Expires: '+esc(fmtDate(item.expiry))+'</span>' : '')
    +'</div>'
    +'</div></div>'; // close wp-doc-info + wp-doc-top

  // ── Full-width content below the icon row ───────────────────────────────────

  // Issued doc banner (Dropbox Sign)
  if(issued){
    if(issued.status==='pending_signature'||issued.status==='pending'){
      body += '<div class="wp-template-banner" style="background:#eff6ff;border-color:#93c5fd;margin-top:12px;">'
        +'<div class="wp-template-banner-text"><div class="wp-template-banner-label" style="color:#1d4ed8;">✉️ Sent for e-signature</div>'
        +'<div class="wp-template-banner-sub" style="color:#1e40af;">Check your email for the signing link</div></div></div>';
    } else if(issued.status==='signed'||issued.status==='approved'){
      body += '<div class="v-issued-banner signed" style="margin-top:12px;">'+icon('check-circle-2',13)+' Signed document on file'
        +(isPaid()&&issued.signed_file_path
          ? ' <button onclick="event.stopPropagation();downloadOrgFile(\''+esc(issued.signed_file_path)+'\',\'signed_doc.pdf\',event)">'+icon('download',12)+' Download</button>'
          : '')+'</div>';
    } else if(issued.status==='pending_review'){
      body += '<div class="v-issued-banner pending-sig" style="margin-top:12px;">'+icon('clock',13)+' Signed — awaiting employer review</div>';
    }
  }

  // Submission state
  if(sub){
    if(sub.status==='pending'){
      body += '<div class="wp-pending-badge" style="display:inline-flex;margin-top:10px;">⏳ Awaiting admin review</div>';
    } else if(sub.status==='rejected'){
      body += '<div class="wp-rejected-notice" style="margin-top:10px;">'
        +'<div class="wp-rejected-notice-label">❌ Submission rejected</div>'
        +'<div class="wp-rejected-notice-text">'+(sub.review_notes ? esc(sub.review_notes) : 'You can resubmit a corrected document below.')+'</div>'
        +'</div>';
    }
  }

  // Template download banner
  if(item.template_file_path){
    body += '<div class="wp-template-banner" style="margin-top:10px;">'
      +'<div class="wp-template-banner-text"><div class="wp-template-banner-label">📎 Official form required</div>'
      +'<div class="wp-template-banner-sub">Download, complete and submit the official form</div></div>'
      +'<button class="wp-template-dl-btn" onclick="event.stopPropagation();downloadTemplate(\''+esc(item.template_file_path)+'\',\''+esc(item.template_file_name||'template')+'\')">📥 Download</button>'
      +'</div>';
  }

  // Tip text
  if(item.tip){
    body += '<div class="wp-doc-tip" style="margin-top:10px;">'+esc(item.tip)+'</div>';
  }

  // Info panel (hidden; toggled by the ℹ button)
  if(hasInfo){
    let infoHtml = '';
    if(item.info_text) infoHtml += '<div>'+esc(item.info_text)+'</div>';
    if(item.info_url) infoHtml += '<div style="margin-top:6px;"><a href="'+esc(item.info_url)+'" target="_blank" rel="noopener" style="color:var(--accent);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px;">'+icon('external-link',12)+' More info</a></div>';
    body += '<div id="'+infoId+'" class="wp-info-panel" style="display:none;">'+infoHtml+'</div>';
  }

  // Submit button + form (only when not pending)
  const canSubmit = !(sub && sub.status==='pending');
  if(canSubmit){
    const isResubmit = !!(hasFile || sub);
    body += '<button class="'+(isResubmit ? 'wp-doc-btn-secondary' : 'wp-doc-btn')+'" onclick="toggleSubmitForm(\''+sfId+'\')">'
      +(isResubmit ? 'Submit replacement' : 'Submit update')+'</button>';
    body += buildSubmitForm(sfId, orgIdx, item.key);
  }

  return '<div class="wp-doc-row" style="'+leftBorder+'">'+body+'</div>';
}

function humanizeDocKey(key){
  // Canonical doc key → friendly name (sourced from document_set_items)
  const map = {
    bsn:'BSN Verification', id:'Valid ID', contract:'Employment Contract',
    vca:'VCA Certificate', vca_vol:'VCA VOL Certificate', vog:'Certificate of Conduct',
    kvk:'KvK Registration', payroll:'Payroll Registration', wml:'Minimum Wage Check',
    rie:'RI&E', scc:'SCC/VCA Certificate', model:'Model Agreement', dba:'ZZP Assessment',
    limosa:'LIMOSA Declaration', dimona:'DIMONA Declaration', niss:'NISS Verification',
    onss:'ONSS/RSZ Registration', first_aid:'First Aid Certificate', cao:'CAO Confirmation',
    a1:'A1 Certificate', btw:'VAT Number', bhv:'BHV Certificate', aansp:'Other Insurances',
    pc_cao:'Joint Committee (PC/CAO)', single_permit:'Single Permit', ra:'Risk Analysis (RA)',
    min_wage:'Minimum Wage Check', work_permit:'Work Permit', iban:'IBAN',
    arbo:'Certificates', svnr:'SV-Nummer Verification', zko:'ZKO Declaration',
    kv:'Kollektivvertrag (KV)', ogk:'ÖGK Registration', auva:'AUVA Registration',
    buak:'BUAK Registration', erste_hilfe:'First Aid (Erste Hilfe)',
    sicherheit:'Safety Induction', cpc_cao:'Joint Committee (PC/CAO)',
  };
  if(map[key]) return map[key];
  // Strip legacy copy-prefix 'c' chars from doc-set-copy artifacts (e.g. cbsn → bsn, ccvca → vca)
  // Timestamp-based custom keys (c1779...) start with 'c' then digits — never strip those
  const stripped = key.replace(/^c+/, '');
  if(stripped !== key && stripped.length > 0 && !/^\d/.test(stripped) && map[stripped]) return map[stripped];
  if(/^c\d{10,}$/.test(key)) return 'Custom Document';
  return key.replace(/_/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
}

async function submitDoc(orgIdx, docKey, sfId){
  const m = (vaultData.memberships||[])[orgIdx];
  if(!m || !m.worker) return;
  const fileEl = $(sfId+'_file');
  const file   = fileEl && fileEl.files && fileEl.files[0];
  const expiry = $(sfId+'_exp') && $(sfId+'_exp').value || null;
  const issue  = $(sfId+'_iss') && $(sfId+'_iss').value || null;
  const notes  = $(sfId+'_notes') && $(sfId+'_notes').value.trim() || null;
  if(!file){ alert('Please choose a file to upload.'); return; }
  if(file.size > 25*1024*1024){ alert('File is larger than 25 MB — please upload a smaller file.'); return; }

  const btn = $(sfId+'_btn');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Uploading…'; }
  try{
    const { data:{ session } } = await sbClient.auth.getSession();
    if(!session) throw new Error('Session expired — please sign in again.');
    const orgId    = m.org_id;
    const workerId = m.worker.id;
    const ext      = (file.name||'file').split('.').pop().replace(/[^a-zA-Z0-9]/g,'').toLowerCase().slice(0,6);
    const safe     = (file.name||'file').replace(/[^a-zA-Z0-9._-]/g,'_').slice(-60);
    const path     = `${orgId}/worker-submissions/${workerId}/${docKey}/${Date.now()}_${safe}`;

    const up = await sbClient.storage.from(SB_BUCKET).upload(path, file, { upsert:false, contentType: file.type||undefined });
    if(up.error) throw up.error;

    const { error } = await sbClient.rpc('submit_worker_document', {
      p_email:       m.worker.email,
      p_worker_id:   workerId,
      p_doc_key:     docKey,
      p_expiry_date: expiry || null,
      p_issue_date:  issue  || null,
      p_notes:       notes  || null,
      p_file_path:   path,
      p_file_name:   file.name,
      p_file_size:   file.size,
      p_mime_type:   file.type||null,
    });
    if(error) throw error;
    alert('✓ Document submitted! Your employer will review it shortly.');
    await refreshVault();
  }catch(e){
    alert('Submission failed: '+(e.message||'unknown error'));
    if(btn){ btn.disabled=false; btn.textContent='Submit →'; }
  }
}

// ── File preview modal ───────────────────────────────────────────────────────
// Shows a preview of the file before offering download/save. Called instead of
// direct download so users can verify they have the right file on mobile.
async function previewFile(path, name, type, brokerPayload){
  const btn = event && event.currentTarget;
  if(btn){ btn.disabled=true; }
  try{
    let signedUrl;
    if(brokerPayload){
      // Need a brokered signed URL (paywalled)
      if(!isPaid()){ onUpgrade(); return; }
      const res = await callFn('get-vault-file', brokerPayload);
      signedUrl = res.url;
    } else {
      const { data, error } = await sbClient.storage.from(SB_BUCKET).createSignedUrl(path, 300);
      if(error) throw error;
      signedUrl = data.signedUrl;
    }

    const ext = (name||path||'').split('.').pop().toLowerCase();
    const isPdf = ext==='pdf';
    const isImg = ['jpg','jpeg','png','gif','webp','heic'].includes(ext);

    let preview = '';
    if(isPdf){
      preview = '<iframe src="'+esc(signedUrl)+'" style="width:100%;height:55vh;border:none;border-radius:8px;background:#f8fafc;" title="'+esc(name)+'"></iframe>';
    } else if(isImg){
      preview = '<img src="'+esc(signedUrl)+'" style="width:100%;max-height:55vh;object-fit:contain;border-radius:8px;background:#f8fafc;" alt="'+esc(name)+'"/>';
    } else {
      preview = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;color:#94a3b8;">'
        +icon('file-text',40)+'<div style="margin-top:12px;font-size:13px;font-weight:600;color:#64748b;">'+esc(name||'Document')+'</div>'
        +'<div style="font-size:12px;color:#94a3b8;margin-top:4px;">Preview not available for this file type</div></div>';
    }

    const downloadUrl = signedUrl; // fresh 5-min URL is enough for immediate download
    const body = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">'
      +'<div style="font-size:15px;font-weight:800;color:#1e293b;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(name||'Document')+'</div>'
      +'<button style="background:none;border:none;color:#94a3b8;cursor:pointer;padding:4px;" onclick="closeModal()">'+icon('x',18)+'</button>'
      +'</div>'
      + preview
      +'<div style="display:flex;gap:10px;margin-top:14px;">'
      +'<button class="v-ghost-btn" style="flex:1;" onclick="closeModal()">Close</button>'
      +'<a class="v-primary-btn" style="flex:2;display:inline-flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;" href="'+esc(downloadUrl)+'" download="'+esc(name||'document')+'" target="_blank">'
      +icon('download',16)+' Download / Save'
      +'</a>'
      +'</div>';

    setModal(body);
    $('vModalOverlay').classList.add('open');
  }catch(e){
    alert('Could not open file: '+(e.message||'unknown error'));
  }finally{
    if(btn){ btn.disabled=false; }
  }
}

async function downloadOrgFile(path, name, ev){
  // Route through preview modal instead of direct download
  previewFile(path, name, 'org');
  if(ev){ ev.stopPropagation && ev.stopPropagation(); }
}

async function downloadTemplate(path, name){
  try{
    const { data, error } = await sbClient.storage.from(SB_BUCKET).createSignedUrl(path, 120, { download: name });
    if(error) throw error;
    if(data && data.signedUrl) window.open(data.signedUrl,'_blank');
  }catch(e){ alert('Could not download template: '+(e.message||'unknown error')); }
}

  const proposed = $(rfId+'_date') && $(rfId+'_date').value || null;
  const notes    = $(rfId+'_notes') && $(rfId+'_notes').value.trim() || null;
  const fileEl   = $(rfId+'_file');
  const file     = fileEl && fileEl.files && fileEl.files[0];
  const btn      = $(rfId+'_btn');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Submitting…'; }

  let filePath=null, fileName=null, fileSize=null, mimeType=null;
  try{
    if(file){
      if(file.size > 25*1024*1024){ alert('File exceeds 25 MB.'); return; }
      const orgId    = m.org_id;
      const workerId = m.worker.id;
      const safe     = (file.name||'file').replace(/[^a-zA-Z0-9._-]/g,'_').slice(-60);
      filePath  = `${orgId}/worker-submissions/${workerId}/returns/${Date.now()}_${safe}`;
      const up  = await sbClient.storage.from(SB_BUCKET).upload(filePath, file, { upsert:false, contentType:file.type||undefined });
      if(up.error) throw up.error;
      fileName  = file.name;
      fileSize  = file.size;
      mimeType  = file.type || null;
    }

    const { error } = await sbClient.rpc('submit_resource_return', {
      p_email:         m.worker.email,
      p_worker_id:     m.worker.id,
      p_resource_type: resType,
      p_assignment_id: assignId,
      p_proposed_date: proposed || null,
      p_notes:         notes    || null,
      p_file_path:     filePath,
      p_file_name:     fileName,
      p_file_size:     fileSize,
      p_mime_type:     mimeType,
      p_org_id:        m.org_id,
    });
    if(error) throw error;
    alert('✓ Return request submitted! Your employer will be in touch.');
    await refreshVault();
  }catch(e){
    alert('Could not submit: '+(e.message||'unknown error'));
    if(btn){ btn.disabled=false; btn.textContent='Submit request →'; }
  }
}

async function changeVaultPassword(){
  const pw1 = ($('acc_pw1')&&$('acc_pw1').value||'').trim();
  const pw2 = ($('acc_pw2')&&$('acc_pw2').value||'').trim();
  const btn = $('acc_pw_btn');
  const msg = $('acc_pw_msg');
  function setMsg(t,k){ if(!msg)return; msg.textContent=t; msg.className='login-msg '+k; msg.style.display=t?'block':'none'; }
  setMsg('','');
  if(pw1.length < 8){ setMsg('Password must be at least 8 characters.','error'); return; }
  if(pw1 !== pw2){ setMsg('Passwords don\'t match.','error'); return; }
  if(btn){ btn.disabled=true; btn.textContent='Updating…'; }
  try{
    const { error } = await sbClient.auth.updateUser({ password: pw1 });
    if(error) throw error;
    setMsg('✓ Password updated successfully.','ok');
    if($('acc_pw1')) $('acc_pw1').value='';
    if($('acc_pw2')) $('acc_pw2').value='';
  }catch(e){ setMsg('Could not update password: '+(e.message||'unknown error'),'error'); }
  finally{ if(btn){ btn.disabled=false; btn.textContent='Update password'; } }
}

async function uploadPersonalDoc(){
  const name = ($('puName').value||'').trim();
  const fileEl = $('puFile');
  const file = fileEl && fileEl.files && fileEl.files[0];
  const issued = $('puIssued').value || null;
  const expiry = $('puExpiry').value || null;
  const btn = $('puBtn');
  if(!file){ alert('Please choose a file to upload.'); return; }
  if(file.size > 25*1024*1024){ alert('That file is larger than 25 MB. Please upload a smaller file.'); return; }
  btn.disabled=true; btn.textContent='⏳ Uploading…';
  try{
    const { data:{ session } } = await sbClient.auth.getSession();
    const uid = session && session.user && session.user.id;
    if(!uid) throw new Error('Your session has expired — please sign in again.');
    const safe = (file.name||'file').replace(/[^a-zA-Z0-9._-]/g,'_').slice(-80);
    const path = 'vault/' + uid + '/' + Date.now() + '_' + safe;
    const up = await sbClient.storage.from(SB_BUCKET).upload(path, file, { upsert:false, contentType:file.type||undefined });
    if(up.error) throw up.error;
    const ins = await sbClient.from('vault_documents').insert({
      worker_account_id: uid,
      display_name: name || file.name,
      file_path: path, file_name: file.name,
      issued_date: issued, expiry_date: expiry,
      source: 'worker_upload', active: true,
    });
    if(ins.error) throw ins.error;
    await refreshVault();
  }catch(e){
    alert('Upload failed: '+(e.message||'unknown error'));
    btn.disabled=false; btn.textContent='⬆ Upload to my vault';
  }
}

async function downloadPersonalDoc(id, ev){
  const d = (vaultData.vault_docs||[]).find(x=>x.id===id);

async function deletePersonalDoc(id, label){

    if(error) throw error;
    await refreshVault();
  }catch(e){ alert('Could not delete: '+(e.message||'unknown error')); }
}

function closeModal(){ $('vModalOverlay').classList.remove('open'); $('vModal').innerHTML=''; }
function closePreview(){ const o=$('vPreviewOverlay'); if(o) o.style.display='none'; const p=$('vPreviewPanel'); if(p) p.innerHTML=''; }

function shareableItems(){
  const memberships = vaultData.memberships || [];

  // Build a global name map across ALL memberships so no doc ever shows as a raw key
  const nameMap = {};
  for(const m of memberships){
    for(const it of (m.doc_set_items||[])){
      const key = extractDocKey(it);
      if(key && it.name && !nameMap[key]) nameMap[key] = it.name;
    }
  }

  const out = { byOrg:[], contracts:[], personal:[] };
  const seenKeys = new Set();
  for(const m of memberships){
    // Build file path lookup from worker_doc_files for direct signed-URL preview
    const filePathByKey = {};
    for(const f of (m.worker_doc_files||[])) if(f.doc_key && f.file_path) filePathByKey[f.doc_key] = { path:f.file_path, name:f.file_name||f.file_path.split('/').pop() };
    const orgDocs = [];
    for(const d of (m.worker_docs||[])){
      if(!d.doc_key || !d.has_file || seenKeys.has(d.doc_key)) continue;
      seenKeys.add(d.doc_key);
      const fp = filePathByKey[d.doc_key];
      orgDocs.push({ type:'document', doc_key:d.doc_key,
        label: nameMap[d.doc_key] || humanizeDocKey(d.doc_key),
        status: vaultDocStatus(d),
        file_path: fp && fp.path, file_name: fp && fp.name });
    }
    if(orgDocs.length) out.byOrg.push({ org_name:m.org_name, docs:orgDocs });
    for(const a of (m.assignments||[])){
      if(a.has_contract) out.contracts.push({ type:'contract', assignment_id:a.id,
        label:(a.project_name||'Contract'), org_name:m.org_name });
    }
  }
  for(const d of (vaultData.vault_docs||[])){
    if(d.active===false || d.source==='org_approved') continue;
    out.personal.push({ type:'vault_doc', vault_doc_id:d.id,
      label:d.display_name||d.file_name||'Document',
      status:fileStatusByExpiry(d.expiry_date),
      file_path: d.file_path, file_name: d.file_name||d.display_name });
  }
  return out;
}

async function quickPreviewDoc(shareId, ev){
  if(ev) ev.stopPropagation();
  const it = window._shareMap && window._shareMap[shareId];
  if(!it) return;
  const btn = document.querySelector('[data-preview="'+shareId+'"]');
  if(btn) btn.disabled = true;

  if(!it.file_path){
    if(btn) btn.disabled = false;
    if(it.type==='contract') alert('Contract preview is not available. The file will be included when you send.');
    else alert('Preview not available for this document.');
    return;
  }

  // Show a spinner in the preview overlay immediately so the share modal stays open beneath
  const overlay = $('vPreviewOverlay');
  const panel   = $('vPreviewPanel');
  if(!overlay || !panel){ if(btn) btn.disabled=false; return; }
  panel.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#64748b;">'+icon('loader',24)+' Loading…</div>';
  overlay.style.display = 'flex';

  try{
    const { data, error } = await sbClient.storage.from(SB_BUCKET).createSignedUrl(it.file_path, 300);
    if(error) throw error;
    const signedUrl = data.signedUrl;
    const name = it.file_name || it.label || 'Document';
    const ext  = (name||it.file_path||'').split('.').pop().toLowerCase();
    const isPdf = ext==='pdf';
    const isImg = ['jpg','jpeg','png','gif','webp','heic'].includes(ext);
    let preview = '';
    if(isPdf){
      preview = '<iframe src="'+esc(signedUrl)+'" style="width:100%;height:55vh;border:none;border-radius:8px;background:#f8fafc;" title="'+esc(name)+'"></iframe>';
    } else if(isImg){
      preview = '<img src="'+esc(signedUrl)+'" style="width:100%;max-height:55vh;object-fit:contain;border-radius:8px;background:#f8fafc;" alt="'+esc(name)+'"/>';
    } else {
      preview = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:140px;color:#94a3b8;">'
        +icon('file-text',36)+'<div style="margin-top:10px;font-size:13px;font-weight:600;color:#64748b;">'+esc(name)+'</div>'
        +'<div style="font-size:12px;color:#94a3b8;margin-top:4px;">Preview not available for this file type</div></div>';
    }
    panel.innerHTML =
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">'
      +'<div style="font-size:15px;font-weight:800;color:#1e293b;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(name)+'</div>'
      +'<button style="background:none;border:none;color:#94a3b8;cursor:pointer;padding:4px;" onclick="closePreview()">'+icon('x',18)+'</button>'
      +'</div>'
      + preview
      +'<div style="display:flex;gap:10px;margin-top:14px;">'
      +'<button class="v-ghost-btn" style="flex:1;" onclick="closePreview()">← Back to share</button>'
      +'<a class="v-primary-btn" style="flex:2;display:inline-flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;" href="'+esc(signedUrl)+'" download="'+esc(name)+'" target="_blank">'
      +icon('download',16)+' Download / Save'
      +'</a>'
      +'</div>';
    lucide.createIcons();
  }catch(e){
    overlay.style.display = 'none';
    alert('Could not open: '+(e&&e.message||'unknown error'));
  }finally{
    if(btn) btn.disabled = false;
  }
}

function openShareModal(){
  if(!isPaid()){ onUpgrade(); return; }
  const items = shareableItems();
  const total = items.byOrg.reduce((s,o)=>s+o.docs.length,0) + items.contracts.length + items.personal.length;
  if(!total){ alert('You don\'t have any documents with files to share yet.'); return; }

  let idx = 0;
  window._shareMap = {};

  function shareRow(it){
    const id = 'si_'+(idx++);
    window._shareMap[id] = it;
    const dotHtml = it.status ? statusDot(it.status) : '';
    return '<label class="v-share-row" onclick="event.stopPropagation()">'
      +'<input type="checkbox" data-share="'+id+'" onchange="updateShareCount()"/>'
      +'<div class="v-sr-icon">'+icon('file-text',15)+'</div>'
      +'<div class="v-sr-main"><div class="v-sr-name">'+esc(it.label)+'</div></div>'
      + dotHtml
      +'<button class="v-sr-preview-btn" data-preview="'+id+'" title="Quick preview" onclick="quickPreviewDoc(\''+id+'\',event)">'
      +icon('eye',13)+'</button>'
      +'</label>';
  }

  function section(id, title, rows, avatarHtml='', startOpen=true){
    const chevronStyle = startOpen ? '' : 'transform:rotate(-90deg);';
    const rowsStyle = startOpen ? '' : 'display:none;';
    return '<div class="v-share-section" id="'+id+'">'
      +'<div class="v-share-section-hd" onclick="shareToggleSection(\''+id+'\',event)">'
      +'<div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">'+(avatarHtml||'')
      +'<span class="v-share-section-title">'+esc(title)+'</span>'
      +' <span style="font-size:10px;color:#94a3b8;font-weight:500;">('+rows.length+')</span>'
      +'</div>'
      +'<div class="v-share-section-actions">'
      +'<button class="v-share-selectall" onclick="shareSelectAll(\''+id+'\',true,event)">All</button>'
      +'<div class="v-share-chevron" style="'+chevronStyle+'">'+icon('chevron-down',14)+'</div>'
      +'</div>'
      +'</div>'
      +'<div class="v-share-rows" style="'+rowsStyle+'">'+rows.join('')+'</div>'
      +'</div>';
  }

  let scrollContent = '';
  const multiOrg = items.byOrg.length > 1;
  items.byOrg.forEach((org, i) => {
    const secId = 'ss_org_'+i;
    // If multiple orgs, collapse all but the first
    scrollContent += section(secId, org.org_name, org.docs.map(shareRow), orgAvatar(org.org_name, true), i===0||!multiOrg);
  });
  if(items.contracts.length){
    scrollContent += section('ss_contracts','Contracts',
      items.contracts.map(it=>shareRow({...it, label:it.label+' — '+it.org_name})), '', !multiOrg);
  }
  if(items.personal.length){
    scrollContent += section('ss_personal','My personal files', items.personal.map(shareRow), '', !multiOrg);
    scrollContent += '<div style="font-size:11px;color:#94a3b8;margin:4px 0 8px;padding:0 2px;">Personal files are clearly marked "not verified" for the recipient.</div>';
  }

  const body = '<h3>Share documents</h3>'
    +'<div class="v-modal-sub">Select documents, enter a recipient email, and send. Links expire in 7 days.</div>'
    +'<div class="v-modal-scroll">'+scrollContent+'</div>'
    +'<div class="v-modal-footer">'
    +'<div class="v-field" style="margin-bottom:10px;"><label>Send to</label>'
    +'<input id="shareTo" type="email" inputmode="email" autocomplete="email" placeholder="recipient@example.com"/></div>'
    +'<div class="v-field" style="margin-bottom:14px;"><label>Message (optional)</label>'
    +'<input id="shareMsg" type="text" placeholder="A short note for the recipient"/></div>'
    +'<div class="v-modal-actions">'
    +'<button class="v-ghost-btn" onclick="closeModal()">Cancel</button>'
    +'<button class="v-primary-btn" id="shareSendBtn" onclick="sendShare()">Send</button>'
    +'</div></div>';

  setModal(body);
  $('vModalOverlay').classList.add('open');
}

async function sendShare(){
  const to = ($('shareTo').value||'').trim();
  const message = ($('shareMsg').value||'').trim();
  const checked = [...document.querySelectorAll('[data-share]:checked')].map(el=>window._shareMap[el.dataset.share]).filter(Boolean);
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(to)){ alert('Please enter a valid recipient email.'); return; }
  if(!checked.length){ alert('Select at least one document to share.'); return; }
  const btn=$('shareSendBtn'); btn.disabled=true; btn.textContent='Sending…';
  try{
    const items = checked.map(it=>it.type==='document'?{type:'document',doc_key:it.doc_key,label:it.label}
      :it.type==='contract'?{type:'contract',assignment_id:it.assignment_id,label:it.label}
      :{type:'vault_doc',vault_doc_id:it.vault_doc_id,label:it.label});
    const res = await callFn('send-vault-share', { to, message, items });
    closeModal();
    alert('Sent '+(res.count||items.length)+' document'+(items.length>1?'s':'')+' to '+to+'.');
  }catch(e){
    if(e.status===402){ alert('Sharing is part of the Vault plan.'); }
    else alert('Could not send: '+(e.message||'unknown error'));
    btn.disabled=false; updateShareCount();
  }
}

// ── Submit vault doc to org ──────────────────────────────────────────────────
function _docTypesForMembership(m){
  const setId = m && m.worker && m.worker.document_set_id;
  return (m.doc_set_items||[])
    .filter(it=>!setId || String(it.id||'').startsWith(setId+'__') || it.document_set_id===setId)
    .map(it=>({ key:extractDocKey(it), name:it.name||it.id }));
}
function populateSubmitDocKeys(orgIdx){
  const m = (vaultData.memberships||[])[orgIdx];
  const sel = $('submitDocKey');
  if(!m||!sel) return;
  const types = _docTypesForMembership(m);
  sel.innerHTML = types.length
    ? types.map(t=>'<option value="'+esc(t.key)+'">'+esc(t.name)+'</option>').join('')
    : '<option value="">No document types for this employer</option>';
}
function openSubmitToOrgModal(vaultDocId){
  const memberships = vaultData.memberships || [];
  if(!memberships.length){ alert('You\'re not linked to an employer yet.'); return; }
  window._submitVaultDocId = vaultDocId;
  const d = (vaultData.vault_docs||[]).find(x=>x.id===vaultDocId);
  let body = '<h3>Submit to an employer</h3>'
    +'<div class="v-modal-sub">Send <b>'+esc((d&&(d.display_name||d.file_name))||'this document')+'</b> to one of your employers for review. It will appear in their approvals queue.</div>'
    +'<div class="v-field"><label>Employer</label><select id="submitOrg" onchange="populateSubmitDocKeys(this.value)">'
    +  memberships.map((m,i)=>'<option value="'+i+'">'+esc(m.org_name)+'</option>').join('')
    +'</select></div>'
    +'<div class="v-field"><label>Document type</label><select id="submitDocKey"></select></div>'
    +'<div class="v-modal-actions"><button class="v-ghost-btn" onclick="closeModal()">Cancel</button>'
    +'<button class="v-primary-btn" id="submitOrgBtn" onclick="submitVaultToOrg()">📨 Submit</button></div>';
  $('vModal').innerHTML = body;
  $('vModal').querySelectorAll('select').forEach(s=>{ s.style.cssText='width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:#1e293b;outline:none;min-height:42px;background:#fff;'; });
  $('vModalOverlay').classList.add('open');
  populateSubmitDocKeys(0);
}
async function submitVaultToOrg(){
  const orgIdx  = +($('submitOrg').value);
  const m       = (vaultData.memberships||[])[orgIdx];
  const docKey  = $('submitDocKey').value;
  const vaultDocId = window._submitVaultDocId;
  if(!m||!docKey){ alert('Please choose an employer and a document type.'); return; }
  const btn=$('submitOrgBtn'); btn.disabled=true; btn.textContent='⏳ Submitting…';
  try{
    await callFn('submit-vault-to-org', { vault_doc_id:vaultDocId, org_id:m.org_id, doc_key:docKey });
    closeModal();
    alert('✓ Sent to '+m.org_name+' for review.');
  }catch(e){
    alert('Could not submit: '+(e.message||'unknown error'));
    btn.disabled=false; btn.textContent='📨 Submit';
  }
}

// ── Permanence backfill ──────────────────────────────────────────────────────
async function backfillVaultCopies(){
  try{ await callFn('copy-to-vault', {}); }catch(_e){}
}

// ── Edge function caller ─────────────────────────────────────────────────────
async function callFn(name, body){
  const { data:{ session } } = await sbClient.auth.getSession();
  const token = session && session.access_token;
  if(!token) throw new Error('Your session has expired — please sign in again.');
  const resp = await fetch(SUPABASE_URL+'/functions/v1/'+name, {
    method:'POST',
    headers:{ 'Authorization':'Bearer '+token, 'Content-Type':'application/json' },
    body: JSON.stringify(body||{}),
  });
  let data={};
  try{ data = await resp.json(); }catch(_e){}
  if(!resp.ok){
    const err = new Error((data&&data.error)||('Request failed ('+resp.status+')'));
    err.status=resp.status; err.code=data&&data.error;
    throw err;
  }
  return data;
}

// ── Stripe ───────────────────────────────────────────────────────────────────
async function onUpgrade(){
  const btns = document.querySelectorAll('.v-upgrade-btn');
  btns.forEach(b=>{ b.disabled=true; b.dataset._t=b.textContent; b.textContent='Opening…'; });
  try{
    const { url, already, message } = await callFn('create-vault-checkout', {});
    if(already){ alert(message||'You are already on the Vault plan.'); await refreshVault(); return; }
    if(url){ location.href=url; return; }
    throw new Error('Could not start checkout.');
  }catch(e){
    if(e.status===503){ alert('Vault subscriptions aren\'t switched on yet. Questions? '+BRAND.salesEmail); }
    else alert('Could not start the upgrade: '+(e.message||'unknown error'));
  }finally{
    btns.forEach(b=>{ b.disabled=false; if(b.dataset._t) b.textContent=b.dataset._t; });
  }
}
async function onManageSubscription(){
  try{
    const { url } = await callFn('create-vault-portal', {});
    if(url){ location.href=url; return; }
    throw new Error('Could not open billing portal.');
  }catch(e){ alert('Could not open billing management: '+(e.message||'unknown error')); }
}

// ── Downloads ────────────────────────────────────────────────────────────────
async function brokerDownload(payload, btn){
  const orig = btn ? btn.textContent : null;
  if(btn){ btn.disabled=true; btn.textContent='⏳ Preparing…'; }
  try{
    const { url } = await callFn('get-vault-file', payload);
    if(url){ window.open(url,'_blank'); }
    else throw new Error('No file available.');
  }catch(e){
    if(e.status===402||e.code==='upgrade_required'){ alert('Downloads are part of the Vault plan. Upgrade to download and share your documents.'); }
    else if(e.status===404){ alert('That file isn\'t available — your employer may not have uploaded a copy.'); }
    else alert('Could not prepare the download: '+(e.message||'unknown error'));
  }finally{
    if(btn){ btn.disabled=false; btn.textContent=orig; }
  }
}
function onDownload(key, ev){ brokerDownload({ type:'document', doc_key:key }, ev&&ev.currentTarget); }
function onDownloadContract(id, ev){
  if(ev) ev.stopPropagation && ev.stopPropagation();
  previewFile(null, 'Contract', 'contract', { type:'contract', assignment_id:id });
}
function onDownloadVaultAssign(id, ev){
  if(ev) ev.stopPropagation && ev.stopPropagation();
  previewFile(null, 'Contract', 'contract', { type:'vault_assignment', vault_assignment_id:id });
}

// ── Refresh ──────────────────────────────────────────────────────────────────
async function refreshVault(){
  try{
    const { data } = await sbClient.rpc('get_vault_portal');
    if(data){ vaultData=data; renderBody(); }
  }catch(_e){}
}

async function handlePostCheckout(){
  const params = new URLSearchParams(location.search);
  if(!params.has('upgraded')) return;
  history.replaceState({}, '', location.pathname);
  for(let i=0;i<6;i++){
    await refreshVault();
    if(isPaid()) return;
    await new Promise(r=>setTimeout(r, 1500));
  }
}
